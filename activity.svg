<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="abg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0010"/>
      <stop offset="100%" stop-color="#1a0040"/>
    </linearGradient>
    <linearGradient id="aarea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0010" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aspike" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0a0010" stop-opacity="0"/>
    </linearGradient>
    <filter id="ag" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="agg" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ablob" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <style>
      @keyframes aline{0%,100%{opacity:0.8}50%{opacity:1}}
      @keyframes adot{0%,100%{r:4;opacity:0.8}50%{r:7;opacity:1}}
      @keyframes aspike{0%,100%{opacity:0.55}50%{opacity:1}}
      @keyframes ascan{0%{transform:translateX(0)}100%{transform:translateX(820px)}}
      @keyframes agl{0%,100%{opacity:0.06}50%{opacity:0.18}}
      @keyframes aping{0%{r:6;opacity:0.7}100%{r:22;opacity:0}}
      @keyframes aarea{0%,100%{opacity:0.85}50%{opacity:1}}
      .aline{animation:aline 3s ease-in-out infinite}
      .adot{animation:adot 2s ease-in-out infinite}
      .aarea{animation:aarea 5s ease-in-out infinite}
      .aspike{animation:aspike 2.5s ease-in-out infinite}
      .ascan{animation:ascan 8s linear infinite;opacity:0.06}
      .agl{animation:agl 4s ease-in-out infinite}
      .aping{animation:aping 2s ease-out infinite}
    </style>
  </defs>

  <rect width="900" height="200" rx="10" fill="url(#abg)"/>
  <rect width="898" height="198" x="1" y="1" rx="10" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.3"/>

  <!-- Spike glow blob -->
  <circle class="agl" cx="752" cy="50" r="30" fill="#fbbf24" filter="url(#ablob)"/>

  <!-- Grid lines (slightly brighter) -->
  <line x1="60" y1="30"  x2="880" y2="30"  stroke="#1e0050" stroke-width="1"/>
  <line x1="60" y1="70"  x2="880" y2="70"  stroke="#1e0050" stroke-width="1"/>
  <line x1="60" y1="110" x2="880" y2="110" stroke="#1e0050" stroke-width="1"/>
  <line x1="60" y1="150" x2="880" y2="150" stroke="#1e0050" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="50" y="34"  font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#7a6a9a" text-anchor="end">20</text>
  <text x="50" y="74"  font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#7a6a9a" text-anchor="end">15</text>
  <text x="50" y="114" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#7a6a9a" text-anchor="end">10</text>
  <text x="50" y="154" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#7a6a9a" text-anchor="end">5</text>
  <text x="22" y="95" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#8a7aaa" text-anchor="middle" transform="rotate(-90,22,95)">commits/wk</text>

  <!-- X axis month labels -->
  <text x="95"  y="175" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#7a6a9a" text-anchor="middle">Jan</text>
  <text x="225" y="175" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#7a6a9a" text-anchor="middle">Feb</text>
  <text x="355" y="175" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#7a6a9a" text-anchor="middle">Mar</text>
  <text x="485" y="175" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#7a6a9a" text-anchor="middle">Apr</text>
  <text x="615" y="175" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#7a6a9a" text-anchor="middle">May</text>
  <text x="745" y="175" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#fbbf24" font-weight="700" text-anchor="middle">Jun ★</text>

  <!-- Area fill under line (violet) -->
  <polygon class="aarea" fill="url(#aarea)"
    points="60,150 95,145 130,148 160,143 190,147 225,140 260,144 290,141 320,146 355,139 390,143 420,137 450,141 485,135 520,138 550,133 580,136 615,130 650,127 680,122 710,118 740,115 752,32 760,115 780,118 820,120 860,117 880,115 880,155 60,155"/>

  <!-- Spike area fill (gold) -->
  <polygon class="aspike" fill="url(#aspike)"
    points="746,150 758,150 758,30 746,30"/>

  <!-- Main activity line -->
  <polyline class="aline" fill="none" stroke="#c084fc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#ag)"
    points="60,150 95,145 130,148 160,143 190,147 225,140 260,144 290,141 320,146 355,139 390,143 420,137 450,141 485,135 520,138 550,133 580,136 615,130 650,127 680,122 710,118 740,115 752,32 760,115 780,118 820,120 860,117 880,115"/>

  <!-- Data point dots on line (key months) with count callouts -->
  <circle cx="95"  cy="145" r="3" fill="#c084fc" opacity="0.7"/>
  <text x="95"  y="139" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#7a6a9a" text-anchor="middle">2</text>
  <circle cx="225" cy="140" r="3" fill="#c084fc" opacity="0.7"/>
  <text x="225" y="134" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#7a6a9a" text-anchor="middle">3</text>
  <circle cx="355" cy="139" r="3" fill="#c084fc" opacity="0.7"/>
  <text x="355" y="133" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#7a6a9a" text-anchor="middle">4</text>
  <circle cx="485" cy="135" r="3" fill="#c084fc" opacity="0.7"/>
  <text x="485" y="129" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#7a6a9a" text-anchor="middle">5</text>
  <circle cx="615" cy="130" r="3" fill="#c084fc" opacity="0.7"/>
  <text x="615" y="124" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#7a6a9a" text-anchor="middle">7</text>

  <!-- Spike ping rings (expanding, staggered) -->
  <circle class="aping" cx="752" cy="32" r="6" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <circle class="aping" cx="752" cy="32" r="6" fill="none" stroke="#fbbf24" stroke-width="1" style="animation-delay:-1s"/>

  <!-- Spike dot -->
  <circle class="adot aspike" cx="752" cy="32" r="5" fill="#fbbf24" filter="url(#agg)"/>
  <circle cx="752" cy="32" r="3" fill="#fbbf24"/>

  <!-- Spike label -->
  <line x1="752" y1="44" x2="752" y2="150" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <rect x="706" y="10" width="92" height="20" rx="5" fill="#1a0040" stroke="#fbbf24" stroke-width="1"/>
  <text x="752" y="24" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="700">🚀 Jun 18 · +25 commits</text>

  <!-- Scan line animation -->
  <rect class="ascan" x="60" y="20" width="3" height="140" fill="#c084fc"/>

  <!-- Title -->
  <text x="75" y="17" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#fbbf24" filter="url(#ag)">📈 Contribution Activity — 2026</text>
  <text x="880" y="17" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#6a5a8a" text-anchor="end">hydra-algaib</text>

  <!-- X axis baseline -->
  <line x1="60" y1="155" x2="880" y2="155" stroke="#2d0070" stroke-width="1"/>
</svg>
