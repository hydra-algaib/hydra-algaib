<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tsbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0010"/>
      <stop offset="100%" stop-color="#1a0040"/>
    </linearGradient>
    <linearGradient id="tscard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#140030"/>
      <stop offset="100%" stop-color="#0a001a"/>
    </linearGradient>
    <filter id="tsg" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tsblob" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <style>
      @keyframes tspulse{0%,100%{opacity:0.6}50%{opacity:1}}
      @keyframes tsborder{0%,100%{opacity:0.35;stroke:#c084fc}50%{opacity:0.85;stroke:#fbbf24}}
      @keyframes tsborder2{0%,100%{opacity:0.85;stroke:#fbbf24}50%{opacity:0.35;stroke:#c084fc}}
      @keyframes tshover{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
      @keyframes tsgl{0%,100%{opacity:0.04}50%{opacity:0.1}}
      @keyframes tlearn{0%,100%{stroke-dashoffset:0;opacity:0.5}50%{stroke-dashoffset:-8;opacity:0.9}}
      .tsb1{animation:tsborder  3s ease-in-out infinite}
      .tsb2{animation:tsborder2 3s ease-in-out infinite;animation-delay:-1.5s}
      .tsb3{animation:tsborder  3s ease-in-out infinite;animation-delay:-0.75s}
      .tsb4{animation:tsborder2 3s ease-in-out infinite;animation-delay:-2.25s}
      .tsl{animation:tspulse 2.5s ease-in-out infinite}
      .tsh{animation:tshover 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .tsgl{animation:tsgl 4s ease-in-out infinite}
      .tsgl2{animation:tsgl 4s ease-in-out infinite;animation-delay:-2s}
      .tslearn{animation:tlearn 2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    </style>
  </defs>

  <rect width="900" height="420" fill="url(#tsbg)"/>

  <!-- Section glow blobs -->
  <circle class="tsgl"  cx="450" cy="56"  r="80" fill="#c084fc" filter="url(#tsblob)"/>
  <circle class="tsgl2" cx="450" cy="156" r="80" fill="#fbbf24" filter="url(#tsblob)"/>
  <circle class="tsgl"  cx="450" cy="256" r="80" fill="#c084fc" filter="url(#tsblob)" style="animation-delay:-1s"/>
  <circle class="tsgl2" cx="200" cy="360" r="60" fill="#fbbf24" filter="url(#tsblob)" style="animation-delay:-3s"/>

  <!-- ── SECTION 1: Core ── -->
