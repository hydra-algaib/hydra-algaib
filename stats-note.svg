<svg width="900" height="60" viewBox="0 0 900 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="snbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0010"/>
      <stop offset="50%"  stop-color="#0d0022"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </linearGradient>
    <linearGradient id="snbar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d0070"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="snbar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d0070"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="snbar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d0070"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="sng" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes snp{0%,100%{opacity:0.65}50%{opacity:1}}
      @keyframes snb{0%,100%{opacity:0.4;stroke:#c084fc}50%{opacity:0.9;stroke:#fbbf24}}
      @keyframes snb2{0%,100%{opacity:0.9;stroke:#fbbf24}50%{opacity:0.4;stroke:#c084fc}}
      @keyframes snb3{0%,100%{opacity:0.5;stroke:#c084fc}50%{opacity:0.85;stroke:#fbbf24}}
      @keyframes snw1{0%{width:0}100%{width:52px}}
      @keyframes snw2{0%{width:0}100%{width:28px}}
      @keyframes snw3{0%{width:0}100%{width:80px}}
      @keyframes sndot{0%,100%{opacity:0.5}50%{opacity:1}}
      .snl{animation:snp 3s ease-in-out infinite}
      .snb1{animation:snb  3s ease-in-out infinite}
      .snb2{animation:snb2 3s ease-in-out infinite;animation-delay:-1s}
      .snb3{animation:snb3 3s ease-in-out infinite;animation-delay:-2s}
      .snw1{animation:snw1 1.4s ease-out forwards}
      .snw2{animation:snw2 1.4s ease-out 0.2s forwards;width:0}
      .snw3{animation:snw3 1.4s ease-out 0.4s forwards;width:0}
      .sndot{animation:sndot 2s ease-in-out infinite}
    </style>
  </defs>

  <rect width="900" height="60" fill="url(#snbg)"/>

  <!-- Card 1: Commits -->
  <rect x="12" y="8" width="180" height="44" rx="8" fill="#0d0025"/>
  <rect class="snb1" x="12" y="8" width="180" height="44" rx="8" fill="none" stroke="#c084fc" stroke-width="1"/>
  <text class="snl" x="28" y="27" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#8a7aaa" style="animation-delay:-2.8s">COMMITS 2026</text>
  <text class="snl" x="28" y="42" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="800" fill="#fbbf24" filter="url(#sng)">25+</text>
  <!-- Mini bar -->
  <rect x="90" y="34" width="90" height="5" rx="2" fill="#1a0040"/>
  <rect class="snw1" x="90" y="34" height="5" rx="2" fill="url(#snbar1)"/>
  <text x="182" y="42" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#fbbf24" text-anchor="end">▲ active</text>

  <!-- Divider dot -->
  <circle class="sndot" cx="210" cy="30" r="2" fill="#2d0070"/>

  <!-- Card 2: Repos -->
  <rect x="222" y="8" width="160" height="44" rx="8" fill="#0d0025"/>
  <rect class="snb2" x="222" y="8" width="160" height="44" rx="8" fill="none" stroke="#fbbf24" stroke-width="1"/>
  <text class="snl" x="238" y="27" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#8a7aaa" style="animation-delay:-1.8s">PRIVATE REPOS</text>
  <text class="snl" x="238" y="42" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="800" fill="#c084fc" filter="url(#sng)">3+</text>
  <rect x="278" y="34" width="90" height="5" rx="2" fill="#1a0040"/>
  <rect class="snw2" x="278" y="34" height="5" rx="2" fill="url(#snbar2)"/>
  <text x="372" y="42" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#c084fc" text-anchor="end">🔒 private</text>

  <!-- Divider dot -->
  <circle class="sndot" cx="400" cy="30" r="2" fill="#2d0070" style="animation-delay:-1s"/>

  <!-- Card 3: Languages -->
  <rect x="412" y="8" width="220" height="44" rx="8" fill="#0d0025"/>
  <rect class="snb3" x="412" y="8" width="220" height="44" rx="8" fill="none" stroke="#c084fc" stroke-width="1"/>
  <text class="snl" x="428" y="27" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#8a7aaa" style="animation-delay:-0.8s">TOP LANGUAGES</text>
  <text class="snl" x="428" y="42" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#fbbf24" style="animation-delay:-0.5s">JS</text>
  <text x="452" y="42" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#6a5a8a">·</text>
  <text class="snl" x="462" y="42" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#c084fc" style="animation-delay:-1.2s">TS</text>
  <text x="486" y="42" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#6a5a8a">·</text>
  <text class="snl" x="496" y="42" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#fbbf24" style="animation-delay:-2s">Py</text>
  <!-- Mini lang bars -->
  <rect x="526" y="30" width="90" height="5" rx="2" fill="#1a0040"/>
  <rect class="snw3" x="526" y="30" height="5" rx="2" fill="url(#snbar3)"/>
  <rect x="526" y="37" width="50" height="3" rx="1" fill="#2d0070" opacity="0.6"/>
  <rect x="526" y="42" width="25" height="2" rx="1" fill="#c084fc" opacity="0.4"/>

  <!-- Right: timestamp -->
  <text class="snl" x="888" y="26" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#7a6a9a" text-anchor="end" style="animation-delay:-1.4s">hydra-algaib</text>
  <text class="snl" x="888" y="42" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#7a6a9a" text-anchor="end" font-style="italic" style="animation-delay:-2.2s">Jun 2026</text>
</svg>
