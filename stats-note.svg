<svg width="900" height="52" viewBox="0 0 900 52" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes snp{0%,100%{opacity:0.65}50%{opacity:1}}
      .snl{animation:snp 3s ease-in-out infinite}
    </style>
    <filter id="sng" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="52" fill="#0a0010"/>

  <!-- Badge 1: Total Commits -->
  <rect x="20" y="10" width="210" height="32" rx="6" fill="#1a0040" stroke="#fbbf24" stroke-width="1"/>
  <text x="33" y="30" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#fbbf24">💻</text>
  <text class="snl" x="55" y="30" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#fbbf24" filter="url(#sng)">Total Commits</text>
  <rect x="148" y="10" width="82" height="32" rx="0" fill="#2d0070"/>
  <rect x="148" y="10" width="82" height="32" rx="6" fill="#2d0070"/>
  <rect x="148" y="10" width="6"  height="32" fill="#2d0070"/>
  <text x="189" y="30" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">25+ this year</text>

  <!-- Badge 2: Private repos -->
  <rect x="248" y="10" width="230" height="32" rx="6" fill="#1a0040" stroke="#c084fc" stroke-width="1"/>
  <text x="261" y="30" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#c084fc">🔒</text>
  <text class="snl" x="283" y="30" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#c084fc" filter="url(#sng)">Repos</text>
  <rect x="326" y="10" width="152" height="32" rx="0" fill="#2d0070"/>
  <rect x="326" y="10" width="152" height="32" rx="6" fill="#2d0070"/>
  <rect x="326" y="10" width="6"   height="32" fill="#2d0070"/>
  <text x="402" y="30" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">All work in private repos</text>

  <!-- Right note -->
  <text x="880" y="30" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#444" text-anchor="end" font-style="italic">Stats updated Jun 2026</text>
</svg>
