<svg width="900" height="100" viewBox="0 0 900 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ibg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d001a"/>
      <stop offset="50%" stop-color="#1a0040"/>
      <stop offset="100%" stop-color="#0d001a"/>
    </linearGradient>
    <filter id="ig" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="isoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <style>
      @keyframes ipulse{0%,100%{opacity:0.75}50%{opacity:1}}
      @keyframes ibar{0%,100%{opacity:0.3}50%{opacity:0.7}}
      @keyframes iscan{0%{transform:translateX(-900px)}100%{transform:translateX(900px)}}
      @keyframes ip1{0%,100%{transform:translate(0,0);opacity:0.6}50%{transform:translate(0,-14px);opacity:0.1}}
      @keyframes ip2{0%,100%{transform:translate(0,0);opacity:0.4}50%{transform:translate(0,-20px);opacity:0.05}}
      @keyframes ip3{0%,100%{transform:translate(0,0);opacity:0.5}33%{transform:translate(4px,-10px);opacity:0.15}66%{transform:translate(-3px,-18px);opacity:0.1}}
      @keyframes igl{0%,100%{opacity:0.06}50%{opacity:0.14}}
      @keyframes iborder{0%,100%{stroke:#2d0070;opacity:0.5}50%{stroke:#fbbf24;opacity:0.9}}
      @keyframes iuline{0%,100%{opacity:0.3;transform:scaleX(0.3)}50%{opacity:0.9;transform:scaleX(1)}}
      .it{animation:ipulse 4s ease-in-out infinite}
      .ib{animation:ibar 3s ease-in-out infinite}
      .iborder{animation:iborder 4s ease-in-out infinite}
      .iuline{animation:iuline 4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .iscan{animation:iscan 6s linear infinite;opacity:0.05}
      .ip1{animation:ip1 5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .ip2{animation:ip2 7s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .ip3{animation:ip3 6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .ip4{animation:ip1 4s ease-in-out infinite;animation-delay:-2s;transform-box:fill-box;transform-origin:center}
      .ip5{animation:ip3 8s ease-in-out infinite;animation-delay:-3s;transform-box:fill-box;transform-origin:center}
      .igl{animation:igl 5s ease-in-out infinite}
    </style>
  </defs>

  <rect width="900" height="100" rx="8" fill="url(#ibg)"/>
  <!-- Pulsing card border -->
  <rect class="iborder" x="1" y="1" width="898" height="98" rx="7" fill="none" stroke="#2d0070" stroke-width="1.5"/>

  <!-- Glow blobs -->
  <circle class="igl" cx="200" cy="50" r="60" fill="#c084fc" filter="url(#isoft)"/>
  <circle class="igl" cx="700" cy="50" r="60" fill="#fbbf24" filter="url(#isoft)" style="animation-delay:-2.5s"/>

  <!-- Scan shimmer -->
  <rect class="iscan" x="0" y="0" width="60" height="100" fill="#c084fc"/>

  <!-- Accent bars -->
  <rect class="ib" x="0" y="0" width="4" height="100" rx="2" fill="#fbbf24"/>
  <rect class="ib" x="896" y="0" width="4" height="100" rx="2" fill="#c084fc"/>

  <!-- Particles -->
  <circle class="ip1" cx="80"  cy="72" r="2"   fill="#fbbf24"/>
  <circle class="ip2" cx="160" cy="30" r="1.5" fill="#c084fc"/>
  <circle class="ip3" cx="300" cy="80" r="1.2" fill="#fbbf24"/>
  <circle class="ip4" cx="620" cy="25" r="1.5" fill="#c084fc"/>
  <circle class="ip5" cx="750" cy="78" r="2"   fill="#fbbf24"/>
  <circle class="ip1" cx="840" cy="35" r="1.2" fill="#c084fc" style="animation-delay:-1s"/>

  <!-- Animated underline under main text -->
  <rect class="iuline" x="350" y="44" width="200" height="2" rx="1" fill="#fbbf24"/>

  <!-- Main bio text -->
  <text class="it" x="450" y="38" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="600"
        fill="#ffffff" text-anchor="middle" filter="url(#ig)">I build complete web applications — from idea to production.</text>

  <text x="450" y="62" font-family="'Segoe UI',Arial,sans-serif" font-size="13"
        fill="#c084fc" text-anchor="middle">Focus: <tspan fill="#fbbf24">AI chatbots</tspan> · <tspan fill="#fbbf24">SaaS platforms</tspan> · <tspan fill="#fbbf24">admin dashboards</tspan> · <tspan fill="#fbbf24">automation systems</tspan></text>

  <text x="450" y="84" font-family="'Segoe UI',Arial,sans-serif" font-size="12"
        fill="#7a6a9a" text-anchor="middle">Currently building my freelance brand · taking on independent projects from Spain 🇪🇸</text>
</svg>
