<svg width="1200" height="120" viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0010">
        <animate attributeName="stop-color" values="#0a0010;#1a0040;#0a0010" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#2d0070">
        <animate attributeName="stop-color" values="#2d0070;#4a00a0;#2d0070" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0a0010">
        <animate attributeName="stop-color" values="#0a0010;#1a0040;#0a0010" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- Wave layers -->
  <path d="M0,40 C200,10 400,60 600,30 C800,0 1000,50 1200,20 L1200,120 L0,120 Z" fill="#1a0040" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="0,0;-20,8;0,0" dur="7s" repeatCount="indefinite"/>
  </path>
  <path d="M0,55 C250,25 500,70 750,40 C900,20 1100,55 1200,35 L1200,120 L0,120 Z" fill="url(#fg)">
    <animateTransform attributeName="transform" type="translate" values="0,0;15,-5;0,0" dur="5s" repeatCount="indefinite"/>
  </path>
  <path d="M0,75 C300,55 600,80 900,60 C1050,50 1150,70 1200,60 L1200,120 L0,120 Z" fill="#0a0010">
    <animateTransform attributeName="transform" type="translate" values="0,0;-10,3;0,0" dur="9s" repeatCount="indefinite"/>
  </path>

  <!-- Accent line at top -->
  <line x1="0" y1="2" x2="1200" y2="2" stroke="#c084fc" stroke-width="1.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Floating particles -->
  <circle cx="150" cy="25" r="1.5" fill="#fbbf24" opacity="0.6">
    <animate attributeName="cy" values="25;15;25" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="20" r="1" fill="#c084fc" opacity="0.5">
    <animate attributeName="cy" values="20;10;20" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="28" r="1.5" fill="#fbbf24" opacity="0.6">
    <animate attributeName="cy" values="28;18;28" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>
