<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fgr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0010"/>
      <stop offset="30%"  stop-color="#2d0070"/>
      <stop offset="70%"  stop-color="#1a0040"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </linearGradient>
    <linearGradient id="fgold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0010" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="70%"  stop-color="#c084fc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0010" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fsig" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff"  stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <filter id="ftg" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fsigglow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fsoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <clipPath id="fsigclip"><rect x="310" y="68" width="280" height="32"/></clipPath>
    <style>
      @keyframes fw1{0%,100%{transform:translate(0,0)}50%{transform:translate(-18px,7px)}}
      @keyframes fw2{0%,100%{transform:translate(0,0)}50%{transform:translate(14px,-5px)}}
      @keyframes fw3{0%,100%{transform:translate(0,0)}50%{transform:translate(-8px,3px)}}
      @keyframes fw4{0%,100%{transform:translate(0,0)}50%{transform:translate(10px,-4px)}}
      @keyframes ffloat{0%,100%{transform:translateY(0);opacity:0.6}50%{transform:translateY(-14px);opacity:0.05}}
      @keyframes ffloat2{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(-18px);opacity:0.05}}
      @keyframes fline{0%,100%{opacity:0.25}50%{opacity:0.6}}
      @keyframes ftxt{0%,100%{opacity:0.7}50%{opacity:1}}
      @keyframes fglow{0%,100%{opacity:0.05}50%{opacity:0.14}}
      @keyframes fscan{0%{transform:translateX(-900px)}100%{transform:translateX(900px)}}
      @keyframes fshimmer{0%{transform:translateX(-300px)}100%{transform:translateX(300px)}}
      @keyframes fdate{0%,100%{opacity:0.4}50%{opacity:0.8}}
      .fw1{animation:fw1 7s ease-in-out infinite}
      .fw2{animation:fw2 5s ease-in-out infinite}
      .fw3{animation:fw3 9s ease-in-out infinite}
      .fw4{animation:fw4 6s ease-in-out infinite}
      .fp1{animation:ffloat  4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .fp2{animation:ffloat2 5.5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .fp3{animation:ffloat  3.5s ease-in-out infinite;animation-delay:-2s;transform-box:fill-box;transform-origin:center}
      .fp4{animation:ffloat2 6s ease-in-out infinite;animation-delay:-1s;transform-box:fill-box;transform-origin:center}
      .fp5{animation:ffloat  4.5s ease-in-out infinite;animation-delay:-3s;transform-box:fill-box;transform-origin:center}
      .fp6{animation:ffloat2 5s ease-in-out infinite;animation-delay:-2s;transform-box:fill-box;transform-origin:center}
      .fp7{animation:ffloat  3.8s ease-in-out infinite;animation-delay:-1.5s;transform-box:fill-box;transform-origin:center}
      .fline{animation:fline 4s ease-in-out infinite}
      .ftxt{animation:ftxt 3s ease-in-out infinite}
      .fglow{animation:fglow 5s ease-in-out infinite}
      .fscan{animation:fscan 7s linear infinite;opacity:0.04}
      .fshimmer{animation:fshimmer 2.8s linear infinite}
      .fdate{animation:fdate 4s ease-in-out infinite}
      @keyframes fspark{0%,100%{opacity:0.4;transform:scale(1) rotate(0deg)}50%{opacity:1;transform:scale(1.15) rotate(8deg)}}
      .fspark{animation:fspark 2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    </style>
  </defs>

  <!-- Glow blobs -->
  <circle class="fglow" cx="250" cy="80" r="100" fill="#c084fc" filter="url(#fsoft)"/>
  <circle class="fglow" cx="650" cy="80" r="100" fill="#fbbf24" filter="url(#fsoft)" style="animation-delay:-2.5s"/>
  <circle class="fglow" cx="450" cy="60" r="60"  fill="#fbbf24" filter="url(#fsoft)" style="animation-delay:-1.2s"/>

  <!-- Scan shimmer -->
  <rect class="fscan" x="0" y="0" width="80" height="140" fill="#c084fc"/>

  <!-- Top accent line -->
  <line class="fline" x1="0" y1="2" x2="900" y2="2" stroke="url(#fgold)" stroke-width="1.5"/>

  <!-- Wave layers -->
  <path class="fw1" d="M0,50 C150,20 300,65 450,35 C600,5 750,55 900,25 L900,140 L0,140 Z"
        fill="#1a0040" opacity="0.45"/>
  <path class="fw2" d="M0,62 C180,35 380,75 560,48 C700,28 820,60 900,42 L900,140 L0,140 Z"
        fill="url(#fgr)" opacity="0.8"/>
  <path class="fw3" d="M0,78 C220,60 460,88 680,68 C790,58 860,75 900,68 L900,140 L0,140 Z"
        fill="#0d0025" opacity="0.9"/>
  <path class="fw4" d="M0,95 C300,80 600,100 900,88 L900,140 L0,140 Z"
        fill="#0a0010"/>

  <!-- Particles — more of them -->
  <circle class="fp1" cx="80"  cy="38" r="1.5" fill="#fbbf24"/>
  <circle class="fp2" cx="220" cy="28" r="1"   fill="#c084fc"/>
  <circle class="fp3" cx="380" cy="22" r="1.8" fill="#fbbf24"/>
  <circle class="fp4" cx="520" cy="32" r="1"   fill="#c084fc"/>
  <circle class="fp5" cx="680" cy="26" r="1.5" fill="#fbbf24"/>
  <circle class="fp6" cx="800" cy="35" r="1.2" fill="#c084fc"/>
  <circle class="fp7" cx="150" cy="55" r="1"   fill="#fbbf24"/>

  <!-- Signature with stronger glow + shimmer -->
  <text class="ftxt" x="450" y="86"
        font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="800"
        fill="#fbbf24" text-anchor="middle" filter="url(#fsigglow)" letter-spacing="3">hydra-algaib</text>
  <!-- Shimmer overlay on signature -->
  <rect class="fshimmer" x="310" y="68" width="60" height="32" fill="url(#fsig)" clip-path="url(#fsigclip)"/>

  <text x="450" y="106"
        font-family="'Segoe UI',Arial,sans-serif" font-size="10"
        fill="#c084fc" text-anchor="middle" letter-spacing="1.5" opacity="0.75">Full Stack · AI · Freelance · Spain 🇪🇸</text>

  <text class="fdate" x="450" y="120"
        font-family="'Segoe UI',Arial,sans-serif" font-size="9"
        fill="#fbbf24" text-anchor="middle" letter-spacing="1" opacity="0.5">Jun 2026 · profile launch 🚀</text>

  <!-- Built-with credit — visible on dark bg -->
  <text class="fspark" x="380" y="133" font-family="Arial" font-size="9" fill="#fbbf24" text-anchor="middle">✦</text>
  <text x="450" y="133"
        font-family="'Segoe UI',Arial,sans-serif" font-size="8"
        fill="#7a5aaa" text-anchor="middle">built with Claude Code · anthropic · Jun 2026</text>
  <text class="fspark" x="520" y="133" font-family="Arial" font-size="9" fill="#c084fc" text-anchor="middle" style="animation-delay:-1s">✦</text>
</svg>
