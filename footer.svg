<svg width="1200" height="120" viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0010"/>
      <stop offset="50%" stop-color="#2d0070"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </linearGradient>
    <style>
      @keyframes wave1 { 0%,100% { transform: translateX(0px) translateY(0px); } 50% { transform: translateX(-20px) translateY(8px); } }
      @keyframes wave2 { 0%,100% { transform: translateX(0px) translateY(0px); } 50% { transform: translateX(15px) translateY(-5px); } }
      @keyframes wave3 { 0%,100% { transform: translateX(0px) translateY(0px); } 50% { transform: translateX(-10px) translateY(3px); } }
      @keyframes float1 { 0%,100% { transform: translateY(0px); opacity: 0.6; } 50% { transform: translateY(-10px); opacity: 0.1; } }
      @keyframes float2 { 0%,100% { transform: translateY(0px); opacity: 0.5; } 50% { transform: translateY(-12px); opacity: 0.1; } }
      @keyframes line-pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }

      .fw1 { animation: wave1 7s ease-in-out infinite; }
      .fw2 { animation: wave2 5s ease-in-out infinite; }
      .fw3 { animation: wave3 9s ease-in-out infinite; }
      .fp1 { animation: float1 4s ease-in-out infinite; }
      .fp2 { animation: float2 5s ease-in-out infinite; }
      .fp3 { animation: float1 3.5s ease-in-out infinite; }
      .fline { animation: line-pulse 4s ease-in-out infinite; }
    </style>
  </defs>

  <path class="fw1" d="M0,40 C200,10 400,60 600,30 C800,0 1000,50 1200,20 L1200,120 L0,120 Z" fill="#1a0040" opacity="0.5"/>
  <path class="fw2" d="M0,55 C250,25 500,70 750,40 C900,20 1100,55 1200,35 L1200,120 L0,120 Z" fill="url(#fg)"/>
  <path class="fw3" d="M0,75 C300,55 600,80 900,60 C1050,50 1150,70 1200,60 L1200,120 L0,120 Z" fill="#0a0010"/>

  <line class="fline" x1="0" y1="2" x2="1200" y2="2" stroke="#c084fc" stroke-width="1.5"/>

  <circle class="fp1" cx="150" cy="25" r="1.5" fill="#fbbf24"/>
  <circle class="fp2" cx="600" cy="20" r="1" fill="#c084fc"/>
  <circle class="fp3" cx="1050" cy="28" r="1.5" fill="#fbbf24"/>
</svg>
