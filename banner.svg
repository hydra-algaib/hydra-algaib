<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0010"/>
      <stop offset="45%" stop-color="#1a0040"/>
      <stop offset="70%" stop-color="#2d0070"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="48%"  stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff"  stop-opacity="0.4"/>
      <stop offset="52%"  stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scangrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#c084fc" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#c084fc" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <filter id="gg" x="-25%" y="-50%" width="150%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gp" x="-25%" y="-50%" width="150%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="halo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <clipPath id="clip"><rect width="1200" height="280"/></clipPath>
    <style>
      @keyframes w1{0%,100%{transform:translate(0,0)}33%{transform:translate(-25px,8px)}66%{transform:translate(15px,-5px)}}
      @keyframes w2{0%,100%{transform:translate(0,0)}33%{transform:translate(20px,-10px)}66%{transform:translate(-10px,6px)}}
      @keyframes w3{0%,100%{transform:translate(0,0)}33%{transform:translate(-15px,5px)}66%{transform:translate(25px,-8px)}}
      @keyframes w4{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,12px)}}
      @keyframes w5{0%,100%{transform:translate(0,0)}50%{transform:translate(18px,-6px)}}
      @keyframes shimmer{0%{transform:translateX(-1200px)}100%{transform:translateX(2400px)}}
      @keyframes scan{0%{transform:translateY(-60px)}100%{transform:translateY(340px)}}
      @keyframes tpulse{0%,100%{opacity:1}50%{opacity:0.85}}
      @keyframes spulse{0%,100%{opacity:1}50%{opacity:0.6}}
      @keyframes lpulse{0%,100%{opacity:0.25}50%{opacity:0.8}}
      @keyframes sepx{0%,100%{transform:scaleX(1);opacity:0.4}50%{transform:scaleX(1.2);opacity:0.75}}
      @keyframes hpulse{0%,100%{opacity:0.18}50%{opacity:0.35}}
      @keyframes fa{0%,100%{transform:translateY(0);opacity:0.7}50%{transform:translateY(-16px);opacity:0.15}}
      @keyframes fb{0%,100%{transform:translateY(0);opacity:0.6}50%{transform:translateY(-22px);opacity:0.1}}
      @keyframes fc{0%,100%{transform:translateY(0);opacity:0.5}50%{transform:translateY(-13px);opacity:0.1}}
      @keyframes fd{0%,100%{transform:translateY(0);opacity:0.65}50%{transform:translateY(-19px);opacity:0.12}}
      @keyframes fe{0%,100%{transform:translateY(0);opacity:0.55}50%{transform:translateY(-26px);opacity:0.08}}
      @keyframes ff{0%,100%{transform:translateY(0);opacity:0.45}50%{transform:translateY(-11px);opacity:0.1}}
      @keyframes dspin{0%,100%{transform:rotate(0deg);opacity:0.4}50%{transform:rotate(45deg);opacity:0.12}}
      @keyframes dfloat{0%,100%{transform:translateY(0) rotate(0deg);opacity:0.35}50%{transform:translateY(-18px) rotate(180deg);opacity:0.08}}
      .w1{animation:w1 6s ease-in-out infinite}
      .w2{animation:w2 8s ease-in-out infinite}
      .w3{animation:w3 10s ease-in-out infinite}
      .w4{animation:w4 7s ease-in-out infinite}
      .w5{animation:w5 5s ease-in-out infinite}
      .shimmer{animation:shimmer 3.5s linear infinite}
      .scan{animation:scan 4s linear infinite}
      .title{animation:tpulse 3.5s ease-in-out infinite}
      .sub{animation:spulse 4.5s ease-in-out infinite}
      .tl{animation:lpulse 3s ease-in-out infinite}
      .sep{animation:sepx 5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .hal{animation:hpulse 4s ease-in-out infinite}
      .p1{animation:fa 4s ease-in-out infinite}
      .p2{animation:fb 5.2s ease-in-out infinite}
      .p3{animation:fc 3.6s ease-in-out infinite}
      .p4{animation:fd 4.8s ease-in-out infinite}
      .p5{animation:fe 6.1s ease-in-out infinite}
      .p6{animation:ff 3.9s ease-in-out infinite}
      .p7{animation:fa 5.5s ease-in-out infinite;animation-delay:-2s}
      .p8{animation:fb 4.3s ease-in-out infinite;animation-delay:-1s}
      .p9{animation:fc 7s ease-in-out infinite;animation-delay:-3s}
      .p10{animation:fd 3.2s ease-in-out infinite;animation-delay:-1.5s}
      .p11{animation:fe 5.8s ease-in-out infinite;animation-delay:-2.5s}
      .p12{animation:ff 4.6s ease-in-out infinite;animation-delay:-0.8s}
      .d1{animation:dspin 6s ease-in-out infinite}
      .d2{animation:dfloat 8s ease-in-out infinite}
      .d3{animation:dspin 5s ease-in-out infinite;animation-delay:-2s}
      .d4{animation:dfloat 7s ease-in-out infinite;animation-delay:-3s}
    </style>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1200" height="280" fill="url(#bg)"/>
    <rect class="scan" x="0" y="0" width="1200" height="50" fill="url(#scangrad)"/>
    <path class="w4" d="M0,175 C100,155 250,185 400,165 C550,145 700,175 850,158 C1000,140 1100,165 1200,150 L1200,280 L0,280 Z" fill="#3d0090" opacity="0.25"/>
    <path class="w1" d="M0,195 C150,158 300,215 450,178 C600,140 750,198 900,168 C1050,138 1150,178 1200,158 L1200,280 L0,280 Z" fill="#2d0070" opacity="0.4"/>
    <path class="w2" d="M0,215 C200,182 400,242 600,208 C800,172 1000,232 1200,202 L1200,280 L0,280 Z" fill="#1a0040" opacity="0.55"/>
    <path class="w3" d="M0,235 C250,218 500,248 750,228 C900,215 1050,235 1200,222 L1200,280 L0,280 Z" fill="#120030" opacity="0.7"/>
    <path class="w5" d="M0,252 C300,238 600,258 900,242 C1050,234 1150,248 1200,240 L1200,280 L0,280 Z" fill="#0a0010" opacity="0.85"/>
    <line class="tl" x1="0" y1="3" x2="1200" y2="3" stroke="#c084fc" stroke-width="2"/>
    <rect class="d1" x="75" y="32" width="10" height="10" fill="none" stroke="#fbbf24" stroke-width="1" transform="rotate(45,80,37)"/>
    <rect class="d2" x="1100" y="28" width="8" height="8" fill="none" stroke="#c084fc" stroke-width="1" transform="rotate(45,1104,32)"/>
    <rect class="d3" x="430" y="18" width="6" height="6" fill="none" stroke="#fbbf24" stroke-width="0.8" transform="rotate(45,433,21)"/>
    <rect class="d4" x="760" y="23" width="7" height="7" fill="none" stroke="#c084fc" stroke-width="0.8" transform="rotate(45,763,26)"/>
    <circle class="p1"  cx="80"   cy="55" r="2.5" fill="#fbbf24"/>
    <circle class="p2"  cx="175"  cy="75" r="1.8" fill="#c084fc"/>
    <circle class="p3"  cx="290"  cy="38" r="1.2" fill="#fbbf24"/>
    <circle class="p4"  cx="410"  cy="65" r="2"   fill="#c084fc"/>
    <circle class="p5"  cx="500"  cy="28" r="1.5" fill="#fbbf24"/>
    <circle class="p6"  cx="660"  cy="55" r="1"   fill="#c084fc"/>
    <circle class="p7"  cx="740"  cy="35" r="1.8" fill="#fbbf24"/>
    <circle class="p8"  cx="860"  cy="60" r="2"   fill="#c084fc"/>
    <circle class="p9"  cx="950"  cy="30" r="1.2" fill="#fbbf24"/>
    <circle class="p10" cx="1040" cy="50" r="2.5" fill="#c084fc"/>
    <circle class="p11" cx="1100" cy="38" r="1.5" fill="#fbbf24"/>
    <circle class="p12" cx="1160" cy="68" r="1.2" fill="#c084fc"/>
    <ellipse class="hal" cx="600" cy="112" rx="310" ry="48" fill="#5500cc" filter="url(#halo)"/>
    <text class="title" x="600" y="125" font-family="'Segoe UI',Arial,sans-serif" font-size="64" font-weight="700" fill="#fbbf24" text-anchor="middle" filter="url(#gg)">hydra-algaib</text>
    <rect class="shimmer" x="-1200" y="78" width="1200" height="62" fill="url(#shimmer)"/>
    <text class="sub" x="600" y="165" font-family="'Segoe UI',Arial,sans-serif" font-size="17" fill="#c084fc" text-anchor="middle" filter="url(#gp)">Full Stack Developer · AI &amp; Automation · Freelance · Spain</text>
    <line class="sep" x1="340" y1="185" x2="860" y2="185" stroke="#fbbf24" stroke-width="1.2"/>
  </g>
</svg>
