<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0010">
        <animate attributeName="stop-color" values="#0a0010;#1a0040;#0a0010" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#2d0070">
        <animate attributeName="stop-color" values="#2d0070;#4a00a0;#2d0070" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0a0010">
        <animate attributeName="stop-color" values="#0a0010;#1a0040;#0a0010" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow-gold">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Animated background -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Animated wave bottom layer -->
  <path d="M0,200 C150,160 300,220 450,180 C600,140 750,200 900,170 C1050,140 1150,180 1200,160 L1200,280 L0,280 Z" fill="#2d0070" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="0,0;-30,10;0,0" dur="5s" repeatCount="indefinite"/>
  </path>
  <path d="M0,220 C200,185 400,245 600,210 C800,175 1000,235 1200,205 L1200,280 L0,280 Z" fill="#1a0040" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0,0;20,-8;0,0" dur="7s" repeatCount="indefinite"/>
  </path>
  <path d="M0,245 C300,225 600,255 900,235 C1050,225 1150,240 1200,235 L1200,280 L0,280 Z" fill="#0a0010" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="0,0;-15,5;0,0" dur="9s" repeatCount="indefinite"/>
  </path>

  <!-- Top accent line animated -->
  <line x1="0" y1="3" x2="1200" y2="3" stroke="#c084fc" stroke-width="2">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Floating particles -->
  <circle cx="100" cy="50" r="2" fill="#fbbf24" opacity="0.7">
    <animate attributeName="cy" values="50;35;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="80" r="1.5" fill="#c084fc" opacity="0.6">
    <animate attributeName="cy" values="80;60;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="40" r="1" fill="#fbbf24" opacity="0.5">
    <animate attributeName="cy" values="40;25;40" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="55" r="2" fill="#c084fc" opacity="0.7">
    <animate attributeName="cy" values="55;38;55" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1020" cy="35" r="1.5" fill="#fbbf24" opacity="0.6">
    <animate attributeName="cy" values="35;20;35" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1130" cy="70" r="1" fill="#c084fc" opacity="0.5">
    <animate attributeName="cy" values="70;50;70" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="30" r="1.5" fill="#fbbf24" opacity="0.4">
    <animate attributeName="cy" values="30;15;30" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="60" r="1" fill="#c084fc" opacity="0.5">
    <animate attributeName="cy" values="60;45;60" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Glow halo behind title -->
  <ellipse cx="600" cy="115" rx="280" ry="40" fill="#4a00a0" opacity="0.15" filter="url(#glow-soft)">
    <animate attributeName="opacity" values="0.15;0.3;0.15" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Main title with pulsing glow -->
  <text x="600" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="700"
        fill="#fbbf24" text-anchor="middle" filter="url(#glow-gold)">
    hydra-algaib
    <animate attributeName="opacity" values="1;0.85;1" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle with pulse -->
  <text x="600" y="165" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="400"
        fill="#c084fc" text-anchor="middle" filter="url(#glow-purple)">
    Full Stack Developer · AI &amp; Automation · Freelance · Spain
    <animate attributeName="opacity" values="1;0.6;1" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Animated separator line -->
  <line x1="350" y1="185" x2="850" y2="185" stroke="#fbbf24" stroke-width="1" opacity="0.4">
    <animate attributeName="x1" values="350;300;350" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="850;900;850" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="5s" repeatCount="indefinite"/>
  </line>
</svg>
