<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0010"/>
      <stop offset="50%" stop-color="#2d0070"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </linearGradient>
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes wave1 { 0%,100% { transform: translateX(0px) translateY(0px); } 50% { transform: translateX(-30px) translateY(10px); } }
      @keyframes wave2 { 0%,100% { transform: translateX(0px) translateY(0px); } 50% { transform: translateX(20px) translateY(-8px); } }
      @keyframes wave3 { 0%,100% { transform: translateX(0px) translateY(0px); } 50% { transform: translateX(-15px) translateY(5px); } }
      @keyframes pulse-gold { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }
      @keyframes pulse-sub { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
      @keyframes float1 { 0%,100% { transform: translateY(0px); opacity: 0.7; } 50% { transform: translateY(-15px); opacity: 0.2; } }
      @keyframes float2 { 0%,100% { transform: translateY(0px); opacity: 0.6; } 50% { transform: translateY(-20px); opacity: 0.1; } }
      @keyframes float3 { 0%,100% { transform: translateY(0px); opacity: 0.5; } 50% { transform: translateY(-12px); opacity: 0.1; } }
      @keyframes line-pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }
      @keyframes bar-expand { 0%,100% { transform: scaleX(1); opacity: 0.4; } 50% { transform: scaleX(1.15); opacity: 0.7; } }
      @keyframes bg-pulse { 0%,100% { stop-color: #2d0070; } 50% { stop-color: #4a00a0; } }

      .wave1 { animation: wave1 5s ease-in-out infinite; }
      .wave2 { animation: wave2 7s ease-in-out infinite; }
      .wave3 { animation: wave3 9s ease-in-out infinite; }
      .title { animation: pulse-gold 3s ease-in-out infinite; }
      .subtitle { animation: pulse-sub 4s ease-in-out infinite; }
      .p1 { animation: float1 4s ease-in-out infinite; }
      .p2 { animation: float2 5s ease-in-out infinite; }
      .p3 { animation: float3 3.5s ease-in-out infinite; }
      .p4 { animation: float1 4.5s ease-in-out infinite; }
      .p5 { animation: float2 6s ease-in-out infinite; }
      .p6 { animation: float3 3.8s ease-in-out infinite; }
      .p7 { animation: float1 5.5s ease-in-out infinite; }
      .p8 { animation: float2 4.2s ease-in-out infinite; }
      .topline { animation: line-pulse 3s ease-in-out infinite; }
      .separator { animation: bar-expand 5s ease-in-out infinite; transform-origin: center; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Animated waves -->
  <path class="wave1" d="M0,200 C150,160 300,220 450,180 C600,140 750,200 900,170 C1050,140 1150,180 1200,160 L1200,280 L0,280 Z" fill="#2d0070" opacity="0.4"/>
  <path class="wave2" d="M0,220 C200,185 400,245 600,210 C800,175 1000,235 1200,205 L1200,280 L0,280 Z" fill="#1a0040" opacity="0.6"/>
  <path class="wave3" d="M0,245 C300,225 600,255 900,235 C1050,225 1150,240 1200,235 L1200,280 L0,280 Z" fill="#0a0010" opacity="0.8"/>

  <!-- Top accent line -->
  <line class="topline" x1="0" y1="3" x2="1200" y2="3" stroke="#c084fc" stroke-width="2"/>

  <!-- Floating particles -->
  <circle class="p1" cx="100" cy="50" r="2" fill="#fbbf24"/>
  <circle class="p2" cx="200" cy="80" r="1.5" fill="#c084fc"/>
  <circle class="p3" cx="320" cy="40" r="1" fill="#fbbf24"/>
  <circle class="p4" cx="900" cy="55" r="2" fill="#c084fc"/>
  <circle class="p5" cx="1020" cy="35" r="1.5" fill="#fbbf24"/>
  <circle class="p6" cx="1130" cy="70" r="1" fill="#c084fc"/>
  <circle class="p7" cx="550" cy="30" r="1.5" fill="#fbbf24"/>
  <circle class="p8" cx="680" cy="60" r="1" fill="#c084fc"/>

  <!-- Main title -->
  <text class="title" x="600" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="700"
        fill="#fbbf24" text-anchor="middle" filter="url(#glow-gold)">hydra-algaib</text>

  <!-- Subtitle -->
  <text class="subtitle" x="600" y="165" font-family="'Segoe UI', Arial, sans-serif" font-size="17"
        fill="#c084fc" text-anchor="middle" filter="url(#glow-purple)">Full Stack Developer · AI &amp; Automation · Freelance · Spain</text>

  <!-- Animated separator -->
  <line class="separator" x1="350" y1="185" x2="850" y2="185" stroke="#fbbf24" stroke-width="1"/>
</svg>
