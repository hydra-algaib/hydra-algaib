<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0010"/><stop offset="100%" stop-color="#1a0040"/>
    </linearGradient>
    <linearGradient id="tcard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0040"/><stop offset="100%" stop-color="#0d0025"/>
    </linearGradient>
    <filter id="tg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes tb{0%,100%{opacity:0.4;stroke:#c084fc}50%{opacity:1;stroke:#fbbf24}}
      @keyframes ti{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.15)}}
      @keyframes tl{0%,100%{opacity:0.7}50%{opacity:1}}
      .tb1{animation:tb 3s ease-in-out infinite}
      .tb2{animation:tb 3s ease-in-out infinite;animation-delay:-0.5s}
      .tb3{animation:tb 3s ease-in-out infinite;animation-delay:-1s}
      .tb4{animation:tb 3s ease-in-out infinite;animation-delay:-1.5s}
      .tb5{animation:tb 3s ease-in-out infinite;animation-delay:-2s}
      .tb6{animation:tb 3s ease-in-out infinite;animation-delay:-2.5s}
      .ti1{animation:ti 3s ease-in-out infinite}
      .ti2{animation:ti 3s ease-in-out infinite;animation-delay:-0.5s}
      .ti3{animation:ti 3s ease-in-out infinite;animation-delay:-1s}
      .ti4{animation:ti 3s ease-in-out infinite;animation-delay:-1.5s}
      .ti5{animation:ti 3s ease-in-out infinite;animation-delay:-2s}
      .ti6{animation:ti 3s ease-in-out infinite;animation-delay:-2.5s}
      .tl{animation:tl 2s ease-in-out infinite}
    </style>
  </defs>
  <rect width="900" height="160" fill="url(#tbg)"/>

  <!-- Trophy 1: First Commit -->
  <rect x="10"  y="15" width="132" height="130" rx="10" fill="url(#tcard)"/>
  <rect class="tb1" x="10" y="15" width="132" height="130" rx="10" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <text class="ti1" x="76" y="72" font-family="Arial" font-size="28" text-anchor="middle">🌱</text>
  <text class="tl" x="76" y="100" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle" filter="url(#tg)">First Commit</text>
  <text x="76" y="116" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">The journey starts</text>

  <!-- Trophy 2: Full Stack -->
  <rect x="158" y="15" width="132" height="130" rx="10" fill="url(#tcard)"/>
  <rect class="tb2" x="158" y="15" width="132" height="130" rx="10" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <text class="ti2" x="224" y="72" font-family="Arial" font-size="28" text-anchor="middle">⚡</text>
  <text class="tl" x="224" y="100" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle" filter="url(#tg)">Full Stack</text>
  <text x="224" y="116" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">Front to back</text>

  <!-- Trophy 3: AI Builder -->
  <rect x="306" y="15" width="132" height="130" rx="10" fill="url(#tcard)"/>
  <rect class="tb3" x="306" y="15" width="132" height="130" rx="10" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <text class="ti3" x="372" y="72" font-family="Arial" font-size="28" text-anchor="middle">🤖</text>
  <text class="tl" x="372" y="100" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle" filter="url(#tg)">AI Builder</text>
  <text x="372" y="116" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">Shipped AI products</text>

  <!-- Trophy 4: SaaS Maker -->
  <rect x="454" y="15" width="132" height="130" rx="10" fill="url(#tcard)"/>
  <rect class="tb4" x="454" y="15" width="132" height="130" rx="10" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <text class="ti4" x="520" y="72" font-family="Arial" font-size="28" text-anchor="middle">🏢</text>
  <text class="tl" x="520" y="100" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle" filter="url(#tg)">SaaS Maker</text>
  <text x="520" y="116" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">Built for business</text>

  <!-- Trophy 5: Automation Pro -->
  <rect x="602" y="15" width="132" height="130" rx="10" fill="url(#tcard)"/>
  <rect class="tb5" x="602" y="15" width="132" height="130" rx="10" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <text class="ti5" x="668" y="72" font-family="Arial" font-size="28" text-anchor="middle">⚙️</text>
  <text class="tl" x="668" y="100" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle" filter="url(#tg)">Automation Pro</text>
  <text x="668" y="116" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">Systems that work</text>

  <!-- Trophy 6: Open Source -->
  <rect x="750" y="15" width="140" height="130" rx="10" fill="url(#tcard)"/>
  <rect class="tb6" x="750" y="15" width="140" height="130" rx="10" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <text class="ti6" x="820" y="72" font-family="Arial" font-size="28" text-anchor="middle">🌐</text>
  <text class="tl" x="820" y="100" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle" filter="url(#tg)">Open Source</text>
  <text x="820" y="116" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">Building in public</text>
</svg>
