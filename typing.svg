<svg width="700" height="70" viewBox="0 0 700 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tybg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0010" stop-opacity="0"/>
      <stop offset="12%"  stop-color="#0a0010" stop-opacity="1"/>
      <stop offset="88%"  stop-color="#0a0010" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0010" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tyline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0010" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#2d0070" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#c084fc" stop-opacity="0.6"/>
      <stop offset="80%"  stop-color="#2d0070" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0010" stop-opacity="0"/>
    </linearGradient>
    <filter id="tyf" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes ty1{0%,18%,100%{opacity:1}19%,99%{opacity:0}}
      @keyframes ty2{0%,18%{opacity:0}19%,36%{opacity:1}37%,100%{opacity:0}}
      @keyframes ty3{0%,36%{opacity:0}37%,54%{opacity:1}55%,100%{opacity:0}}
      @keyframes ty4{0%,54%{opacity:0}55%,72%{opacity:1}73%,100%{opacity:0}}
      @keyframes ty5{0%,72%{opacity:0}73%,90%{opacity:1}91%,100%{opacity:0}}
      @keyframes tyblink{0%,49%{opacity:1}50%,100%{opacity:0}}
      @keyframes tyglow{0%,100%{opacity:0.75}50%{opacity:1}}
      @keyframes tyline{0%,100%{opacity:0.3}50%{opacity:0.7}}
      .ty1{animation:ty1 10s ease-in-out infinite}
      .ty2{animation:ty2 10s ease-in-out infinite}
      .ty3{animation:ty3 10s ease-in-out infinite}
      .ty4{animation:ty4 10s ease-in-out infinite}
      .ty5{animation:ty5 10s ease-in-out infinite}
      .cursor{animation:tyblink 0.75s step-end infinite}
      .tg{animation:tyglow 3s ease-in-out infinite}
      .tyline{animation:tyline 3s ease-in-out infinite}
    </style>
  </defs>

  <rect width="700" height="70" fill="#0a0010"/>
  <rect width="700" height="70" fill="url(#tybg)"/>

  <!-- Top accent line -->
  <rect class="tyline" y="1" width="700" height="1" fill="url(#tyline)"/>
  <!-- Bottom accent line -->
  <rect class="tyline" y="68" width="700" height="1" fill="url(#tyline)"/>

  <!-- Rotating text lines — centered at x=350 -->
  <text class="ty1 tg" x="350" y="42"
        font-family="'Courier New',Courier,monospace" font-size="17" font-weight="600"
        fill="#fbbf24" text-anchor="middle" filter="url(#tyf)">Building complete web applications 🚀</text>

  <text class="ty2 tg" x="350" y="42"
        font-family="'Courier New',Courier,monospace" font-size="17" font-weight="600"
        fill="#fbbf24" text-anchor="middle" filter="url(#tyf)">AI chatbots · SaaS tools · Full Stack apps</text>

  <text class="ty3 tg" x="350" y="42"
        font-family="'Courier New',Courier,monospace" font-size="17" font-weight="600"
        fill="#fbbf24" text-anchor="middle" filter="url(#tyf)">From zero to production, end to end</text>

  <text class="ty4 tg" x="350" y="42"
        font-family="'Courier New',Courier,monospace" font-size="17" font-weight="600"
        fill="#fbbf24" text-anchor="middle" filter="url(#tyf)">Open to freelance projects 💼</text>

  <text class="ty5 tg" x="350" y="42"
        font-family="'Courier New',Courier,monospace" font-size="17" font-weight="600"
        fill="#fbbf24" text-anchor="middle" filter="url(#tyf)">hydra-algaib · Spain 🇪🇸 · Available now</text>

  <!-- Cursor: positioned at right edge of visible area, centered vertically -->
  <text class="cursor" x="660" y="46"
        font-family="'Courier New',Courier,monospace" font-size="20" font-weight="700"
        fill="#c084fc" opacity="0.9">▋</text>
</svg>
