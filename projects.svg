<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0010"/>
      <stop offset="100%" stop-color="#1a0040"/>
    </linearGradient>
    <linearGradient id="pcard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0025"/>
      <stop offset="100%" stop-color="#1a0040"/>
    </linearGradient>
    <linearGradient id="pcard3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050012"/>
      <stop offset="100%" stop-color="#0d0025"/>
    </linearGradient>
    <filter id="pg" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="psoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <style>
      @keyframes pb{0%,100%{opacity:0.5}50%{opacity:1}}
      @keyframes pb3{0%,100%{opacity:0.2;stroke:#2d0070}50%{opacity:0.6;stroke:#c084fc}}
      @keyframes pf{0%,100%{transform:translateY(0);opacity:0.6}50%{transform:translateY(-8px);opacity:0.1}}
      @keyframes pf2{0%,100%{transform:translateY(0);opacity:0.5}50%{transform:translateY(-12px);opacity:0.1}}
      @keyframes ptag{0%,100%{opacity:0.7}50%{opacity:1}}
      @keyframes pqs{0%,100%{opacity:0.3}25%{opacity:0.9}50%{opacity:0.3}75%{opacity:0.7}}
      @keyframes plock{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
      .pb1{animation:pb 3s ease-in-out infinite}
      .pb2{animation:pb 3.5s ease-in-out infinite;animation-delay:-1.5s}
      .pb3{animation:pb3 4s ease-in-out infinite}
      .pp1{animation:pf 4s ease-in-out infinite}
      .pp2{animation:pf2 5s ease-in-out infinite}
      .pp3{animation:pf 3.5s ease-in-out infinite;animation-delay:-2s}
      .pp4{animation:pf2 4.5s ease-in-out infinite;animation-delay:-1s}
      .ptag{animation:ptag 2.5s ease-in-out infinite}
      .pqs{animation:pqs 3s ease-in-out infinite}
      .plock{animation:plock 4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    </style>
  </defs>

  <rect width="900" height="220" fill="url(#pbg)"/>

  <!-- Card 1: Sofia -->
  <rect x="12" y="12" width="272" height="196" rx="10" fill="url(#pcard)"/>
  <rect class="pb1" x="12" y="12" width="272" height="196" rx="10" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <circle class="pp1" cx="42" cy="42" r="1.5" fill="#fbbf24"/>
  <circle class="pp2" cx="258" cy="38" r="1" fill="#c084fc"/>

  <rect x="24" y="28" width="36" height="36" rx="8" fill="#2d0070" opacity="0.8"/>
  <text x="42" y="52" font-family="Arial" font-size="18" text-anchor="middle">🤖</text>

  <text x="70" y="42" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700"
        fill="#fbbf24" filter="url(#pg)">sofia-chatbot</text>
  <text x="70" y="58" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c084fc">Private · AI Secretary</text>

  <text x="24" y="88"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#e0e0e0">AI-powered business secretary</text>
  <text x="24" y="104" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#e0e0e0">with WhatsApp integration,</text>
  <text x="24" y="120" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#e0e0e0">appointments &amp; admin panel.</text>

  <line x1="24" y1="135" x2="268" y2="135" stroke="#2d0070" stroke-width="0.8"/>
  <text x="24" y="148" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#666">Claude API · Twilio · Express · Node.js</text>

  <rect class="ptag" x="24"  y="160" width="58" height="18" rx="4" fill="#1a0040" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="53"  y="173" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">Node.js</text>
  <rect class="ptag" x="88"  y="160" width="60" height="18" rx="4" fill="#1a0040" stroke="#c084fc" stroke-width="0.8"/>
  <text x="118" y="173" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">Claude AI</text>
  <rect class="ptag" x="154" y="160" width="62" height="18" rx="4" fill="#1a0040" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="185" y="173" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">WhatsApp</text>

  <text x="148" y="198" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="600">⭐ Featured · SaaS-ready</text>

  <!-- Card 2: GymLog -->
  <rect x="314" y="12" width="272" height="196" rx="10" fill="url(#pcard)"/>
  <rect class="pb2" x="314" y="12" width="272" height="196" rx="10" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <circle class="pp3" cx="344" cy="42" r="1.5" fill="#fbbf24"/>
  <circle class="pp4" cx="560" cy="38" r="1" fill="#c084fc"/>

  <rect x="326" y="28" width="36" height="36" rx="8" fill="#2d0070" opacity="0.8"/>
  <text x="344" y="52" font-family="Arial" font-size="18" text-anchor="middle">💪</text>

  <text x="372" y="42" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700"
        fill="#fbbf24" filter="url(#pg)">gymlog-pwa</text>
  <text x="372" y="58" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c084fc">Private · Fitness PWA</text>

  <text x="326" y="88"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#e0e0e0">Workout tracker PWA with full</text>
  <text x="326" y="104" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#e0e0e0">EN/ES i18n, offline support,</text>
  <text x="326" y="120" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#e0e0e0">installable on any device.</text>

  <line x1="326" y1="135" x2="576" y2="135" stroke="#2d0070" stroke-width="0.8"/>
  <text x="326" y="148" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#666">JavaScript · Service Workers · i18n · CSS</text>

  <rect class="ptag" x="326" y="160" width="40" height="18" rx="4" fill="#1a0040" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="346" y="173" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">PWA</text>
  <rect class="ptag" x="372" y="160" width="68" height="18" rx="4" fill="#1a0040" stroke="#c084fc" stroke-width="0.8"/>
  <text x="406" y="173" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">JavaScript</text>
  <rect class="ptag" x="446" y="160" width="36" height="18" rx="4" fill="#1a0040" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="464" y="173" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">i18n</text>

  <text x="450" y="198" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="600">📱 Mobile-first · Zero backend</text>

  <!-- Card 3: Coming Soon -->
  <rect x="616" y="12" width="272" height="196" rx="10" fill="url(#pcard3)"/>
  <rect class="pb3" x="616" y="12" width="272" height="196" rx="10" fill="none" stroke="#2d0070" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Mystery glow -->
  <circle cx="752" cy="90" r="60" fill="#c084fc" filter="url(#psoft)" opacity="0.05"/>

  <text class="plock" x="752" y="75" font-family="Arial" font-size="32" text-anchor="middle">🔮</text>

  <text class="pqs" x="752" y="105" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700"
        fill="#4a0090" text-anchor="middle" filter="url(#pg)">Next Project</text>

  <text x="752" y="128" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#333" text-anchor="middle">Currently in stealth mode.</text>
  <text x="752" y="144" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#333" text-anchor="middle">Building something new.</text>

  <line x1="648" y1="162" x2="856" y2="162" stroke="#1a0040" stroke-width="0.8"/>

  <text x="752" y="180" font-family="'Courier New',Courier,monospace" font-size="10"
        fill="#2d0070" text-anchor="middle">// coming soon</text>

  <text x="752" y="198" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#2d0060"
        text-anchor="middle">Follow for updates · hydra-algaib</text>
</svg>
