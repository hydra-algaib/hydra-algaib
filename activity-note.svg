<svg width="900" height="64" viewBox="0 0 900 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="anbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0010"/>
      <stop offset="50%"  stop-color="#0d001e"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </linearGradient>
    <linearGradient id="anbar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#2d0070"/>
    </linearGradient>
    <linearGradient id="anspike" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="ang" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes anpulse{0%,100%{opacity:0.7}50%{opacity:1}}
      @keyframes andot{0%,100%{r:4;opacity:0.8}50%{r:6;opacity:1}}
      @keyframes anring{0%{r:6;opacity:0.6}100%{r:14;opacity:0}}
      @keyframes anb1{0%,100%{opacity:0.5}50%{opacity:1}}
      @keyframes anb2{0%,100%{opacity:0.35;stroke:#c084fc}50%{opacity:0.9;stroke:#fbbf24}}
      @keyframes ancnt{0%,100%{opacity:0.8}50%{opacity:1}}
      .anl{animation:anpulse 3s ease-in-out infinite}
      .and{animation:andot 2.5s ease-in-out infinite}
      .anring{animation:anring 2s ease-out infinite}
      .anb1{animation:anb1 2.5s ease-in-out infinite}
      .anb2{animation:anb2 3s ease-in-out infinite}
      .ancnt{animation:ancnt 2s ease-in-out infinite}
    </style>
  </defs>

  <rect width="900" height="64" fill="url(#anbg)"/>

  <!-- Status: green dot with ping ring -->
  <circle class="anring" cx="22" cy="32" r="6" fill="none" stroke="#22c55e" stroke-width="1"/>
  <circle class="and" cx="22" cy="32" r="4" fill="#22c55e"/>
  <text class="anl" x="36" y="28" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#22c55e" filter="url(#ang)">Active this week</text>
  <text x="36" y="44" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#5a9a5a">Last push: Jun 19, 2026</text>

  <!-- Separator -->
  <line x1="160" y1="12" x2="160" y2="52" stroke="#1a0040" stroke-width="1"/>

  <!-- Mini sparkline (7 bars = Mon-Sun, Jun 12-18) -->
  <text x="172" y="18" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#555">Week activity</text>
  <!-- Bar heights (proportional, max=30): Mon=4 Tue=6 Wed=3 Thu=8 Fri=12 Sat=10 Sun=30 (launch) -->
  <rect class="anb1" x="172" y="44" width="7" height="4"  rx="1" fill="url(#anbar)" style="animation-delay:0s"/>
  <rect class="anb1" x="182" y="42" width="7" height="6"  rx="1" fill="url(#anbar)" style="animation-delay:-0.3s"/>
  <rect class="anb1" x="192" y="45" width="7" height="3"  rx="1" fill="url(#anbar)" style="animation-delay:-0.6s"/>
  <rect class="anb1" x="202" y="40" width="7" height="8"  rx="1" fill="url(#anbar)" style="animation-delay:-0.9s"/>
  <rect class="anb1" x="212" y="36" width="7" height="12" rx="1" fill="url(#anbar)" style="animation-delay:-1.2s"/>
  <rect class="anb1" x="222" y="38" width="7" height="10" rx="1" fill="url(#anbar)" style="animation-delay:-1.5s"/>
  <!-- Jun 18 spike — gold -->
  <rect x="232" y="18" width="7" height="30" rx="1" fill="url(#anspike)" opacity="0.9"/>
  <!-- X-axis -->
  <line x1="172" y1="50" x2="240" y2="50" stroke="#2d0070" stroke-width="0.8"/>
  <text x="232" y="60" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="#fbbf24" text-anchor="middle">18</text>

  <!-- Separator -->
  <line x1="256" y1="12" x2="256" y2="52" stroke="#1a0040" stroke-width="1"/>

  <!-- Commit counter -->
  <text x="270" y="28" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#555">COMMITS THIS WEEK</text>
  <text class="ancnt" x="270" y="46" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="800" fill="#fbbf24" filter="url(#ang)">25+</text>

  <!-- Separator -->
  <line x1="340" y1="12" x2="340" y2="52" stroke="#1a0040" stroke-width="1"/>

  <!-- Launch badge -->
  <rect x="354" y="18" width="148" height="28" rx="5" fill="#0d0025"/>
  <rect class="anb2" x="354" y="18" width="148" height="28" rx="5" fill="none" stroke="#c084fc" stroke-width="1"/>
  <text x="428" y="36" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#c084fc" text-anchor="middle">🚀 Launched Jun 18 2026</text>

  <!-- Description -->
  <text x="516" y="28" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#555">·  Profile build sprint —</text>
  <text x="516" y="42" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#555">built everything you see here in one week.</text>
</svg>
