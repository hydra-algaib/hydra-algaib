<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0010"/>
      <stop offset="100%" stop-color="#1a0040"/>
    </linearGradient>
    <linearGradient id="wcard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140030"/>
      <stop offset="100%" stop-color="#0d0020"/>
    </linearGradient>
    <filter id="wg" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes wb{0%,100%{opacity:0.35;stroke:#c084fc}50%{opacity:0.85;stroke:#fbbf24}}
      @keyframes wb2{0%,100%{opacity:0.85;stroke:#fbbf24}50%{opacity:0.35;stroke:#c084fc}}
      @keyframes wi{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
      @keyframes wl{0%,100%{opacity:0.7}50%{opacity:1}}
      .wb1{animation:wb  3s ease-in-out infinite}
      .wb2{animation:wb2 3s ease-in-out infinite;animation-delay:-0.5s}
      .wb3{animation:wb  3s ease-in-out infinite;animation-delay:-1s}
      .wb4{animation:wb2 3s ease-in-out infinite;animation-delay:-1.5s}
      .wb5{animation:wb  3s ease-in-out infinite;animation-delay:-2s}
      .wb6{animation:wb2 3s ease-in-out infinite;animation-delay:-2.5s}
      .wi{animation:wi 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .wl{animation:wl 2.5s ease-in-out infinite}
    </style>
  </defs>

  <rect width="900" height="380" fill="url(#wbg)"/>

  <!-- Row 1 -->

  <!-- Card 1: AI Chatbots -->
  <rect x="12"  y="12" width="278" height="160" rx="10" fill="url(#wcard)"/>
  <rect class="wb1" x="12" y="12" width="278" height="160" rx="10" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <text class="wi" x="38" y="58" font-family="Arial" font-size="26">🤖</text>
  <text class="wl" x="75" y="48" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" filter="url(#wg)">AI CHATBOTS</text>
  <text x="75" y="65" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c084fc">Claude API · WhatsApp</text>
  <text x="22" y="95"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">Multi-turn conversations with tool</text>
  <text x="22" y="112" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">use, context memory, webhook</text>
  <text x="22" y="129" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">integration &amp; admin dashboards.</text>
  <line x1="22" y1="148" x2="270" y2="148" stroke="#2d0070" stroke-width="1"/>
  <text x="22" y="162" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#fbbf24">Claude · Twilio · Express · JSON</text>

  <!-- Card 2: SaaS Tools -->
  <rect x="311" y="12" width="278" height="160" rx="10" fill="url(#wcard)"/>
  <rect class="wb2" x="311" y="12" width="278" height="160" rx="10" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text class="wi" x="337" y="58" font-family="Arial" font-size="26">🏢</text>
  <text class="wl" x="374" y="48" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" filter="url(#wg)">SaaS TOOLS</text>
  <text x="374" y="65" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c084fc">Admin panels · Multi-tenant</text>
  <text x="321" y="95"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">Role-based access, billing-ready</text>
  <text x="321" y="112" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">architecture, configurable themes</text>
  <text x="321" y="129" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">and white-label deployments.</text>
  <line x1="321" y1="148" x2="579" y2="148" stroke="#2d0070" stroke-width="1"/>
  <text x="321" y="162" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#fbbf24">Node.js · JWT · MongoDB · React</text>

  <!-- Card 3: Automation -->
  <rect x="610" y="12" width="278" height="160" rx="10" fill="url(#wcard)"/>
  <rect class="wb3" x="610" y="12" width="278" height="160" rx="10" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <text class="wi" x="636" y="58" font-family="Arial" font-size="26">⚙️</text>
  <text class="wl" x="673" y="48" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" filter="url(#wg)">AUTOMATION</text>
  <text x="673" y="65" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c084fc">Webhooks · Cron jobs</text>
  <text x="620" y="95"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">Event-driven workflows, scheduled</text>
  <text x="620" y="112" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">tasks, API integrations and</text>
  <text x="620" y="129" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">real-time notification systems.</text>
  <line x1="620" y1="148" x2="878" y2="148" stroke="#2d0070" stroke-width="1"/>
  <text x="620" y="162" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#fbbf24">Cron · Webhooks · REST · Events</text>

  <!-- Row 2 -->

  <!-- Card 4: Full Stack Apps -->
  <rect x="12"  y="208" width="278" height="160" rx="10" fill="url(#wcard)"/>
  <rect class="wb4" x="12" y="208" width="278" height="160" rx="10" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text class="wi" x="38" y="254" font-family="Arial" font-size="26">🌐</text>
  <text class="wl" x="75" y="244" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" filter="url(#wg)">FULL STACK APPS</text>
  <text x="75" y="261" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c084fc">REST APIs · SPA · SSR</text>
  <text x="22" y="291"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">End-to-end development from DB</text>
  <text x="22" y="308" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">schema to UI, zero-to-production</text>
  <text x="22" y="325" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">deployment included.</text>
  <line x1="22" y1="344" x2="270" y2="344" stroke="#2d0070" stroke-width="1"/>
  <text x="22" y="358" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#fbbf24">React · Express · SQLite · Docker</text>

  <!-- Card 5: Auth & Security -->
  <rect x="311" y="208" width="278" height="160" rx="10" fill="url(#wcard)"/>
  <rect class="wb5" x="311" y="208" width="278" height="160" rx="10" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <text class="wi" x="337" y="254" font-family="Arial" font-size="26">🔐</text>
  <text class="wl" x="374" y="244" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" filter="url(#wg)">AUTH &amp; SECURITY</text>
  <text x="374" y="261" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c084fc">JWT · Sessions · HMAC</text>
  <text x="321" y="291"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">Token-based auth, refresh flows,</text>
  <text x="321" y="308" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">role middleware, signed cookies</text>
  <text x="321" y="325" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">and secure API design patterns.</text>
  <line x1="321" y1="344" x2="579" y2="344" stroke="#2d0070" stroke-width="1"/>
  <text x="321" y="358" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#fbbf24">JWT · HMAC · bcrypt · Middleware</text>

  <!-- Card 6: PWA & Mobile-First -->
  <rect x="610" y="208" width="278" height="160" rx="10" fill="url(#wcard)"/>
  <rect class="wb6" x="610" y="208" width="278" height="160" rx="10" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text class="wi" x="636" y="254" font-family="Arial" font-size="26">📱</text>
  <text class="wl" x="673" y="244" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" filter="url(#wg)">PWA &amp; MOBILE-FIRST</text>
  <text x="673" y="261" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c084fc">Offline · Installable · Responsive</text>
  <text x="620" y="291"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">Service workers, offline caching,</text>
  <text x="620" y="308" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">push notifications, installable on</text>
  <text x="620" y="325" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">any device with no app store.</text>
  <line x1="620" y1="344" x2="878" y2="344" stroke="#2d0070" stroke-width="1"/>
  <text x="620" y="358" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#fbbf24">Service Workers · Cache · i18n</text>
</svg>
