<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0010"/>
      <stop offset="100%" stop-color="#1a0040"/>
    </linearGradient>
    <linearGradient id="wcard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140030"/>
      <stop offset="100%" stop-color="#0d0020"/>
    </linearGradient>
    <filter id="wg" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wblob" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="c1"><rect x="12"  y="12"  width="278" height="160" rx="10"/></clipPath>
    <clipPath id="c2"><rect x="311" y="12"  width="278" height="160" rx="10"/></clipPath>
    <clipPath id="c3"><rect x="610" y="12"  width="278" height="160" rx="10"/></clipPath>
    <clipPath id="c4"><rect x="12"  y="208" width="278" height="160" rx="10"/></clipPath>
    <clipPath id="c5"><rect x="311" y="208" width="278" height="160" rx="10"/></clipPath>
    <clipPath id="c6"><rect x="610" y="208" width="278" height="160" rx="10"/></clipPath>
    <style>
      @keyframes wb{0%,100%{opacity:0.35;stroke:#c084fc}50%{opacity:0.85;stroke:#fbbf24}}
      @keyframes wb2{0%,100%{opacity:0.85;stroke:#fbbf24}50%{opacity:0.35;stroke:#c084fc}}
      @keyframes wi{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
      @keyframes wl{0%,100%{opacity:0.7}50%{opacity:1}}
      @keyframes wscan{0%{transform:translateX(-300px)}100%{transform:translateX(300px)}}
      @keyframes wgl{0%,100%{opacity:0.04}50%{opacity:0.11}}
      .wb1{animation:wb  3s ease-in-out infinite}
      .wb2{animation:wb2 3s ease-in-out infinite;animation-delay:-0.5s}
      .wb3{animation:wb  3s ease-in-out infinite;animation-delay:-1s}
      .wb4{animation:wb2 3s ease-in-out infinite;animation-delay:-1.5s}
      .wb5{animation:wb  3s ease-in-out infinite;animation-delay:-2s}
      .wb6{animation:wb2 3s ease-in-out infinite;animation-delay:-2.5s}
      .wi{animation:wi 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .wl{animation:wl 2.5s ease-in-out infinite}
      .ws{animation:wscan 5s linear infinite;opacity:0.06}
      .ws2{animation:wscan 5s linear infinite;animation-delay:-1.7s;opacity:0.06}
      .ws3{animation:wscan 5s linear infinite;animation-delay:-3.3s;opacity:0.06}
      .ws4{animation:wscan 5s linear infinite;animation-delay:-0.8s;opacity:0.06}
      .ws5{animation:wscan 5s linear infinite;animation-delay:-2.5s;opacity:0.06}
      .ws6{animation:wscan 5s linear infinite;animation-delay:-4.1s;opacity:0.06}
      .wgl{animation:wgl 4s ease-in-out infinite}
      .wgl2{animation:wgl 4s ease-in-out infinite;animation-delay:-2s}
      @keyframes wpb1{0%{width:0}100%{width:232px}}
      @keyframes wpb2{0%{width:0}100%{width:194px}}
      @keyframes wpb3{0%{width:0}100%{width:212px}}
      @keyframes wpb4{0%{width:0}100%{width:245px}}
      @keyframes wpb5{0%{width:0}100%{width:220px}}
      @keyframes wpb6{0%{width:0}100%{width:202px}}
      .wpb1{animation:wpb1 1.6s ease-out forwards}
      .wpb2{animation:wpb2 1.6s ease-out 0.1s forwards;width:0}
      .wpb3{animation:wpb3 1.6s ease-out 0.2s forwards;width:0}
      .wpb4{animation:wpb4 1.6s ease-out 0.3s forwards;width:0}
      .wpb5{animation:wpb5 1.6s ease-out 0.4s forwards;width:0}
      .wpb6{animation:wpb6 1.6s ease-out 0.5s forwards;width:0}
    </style>
  </defs>

  <rect width="900" height="380" fill="url(#wbg)"/>

  <!-- Row glow blobs -->
  <circle class="wgl"  cx="450" cy="92"  r="120" fill="#c084fc" filter="url(#wblob)"/>
  <circle class="wgl2" cx="450" cy="288" r="120" fill="#fbbf24" filter="url(#wblob)"/>

  <!-- ===== ROW 1 ===== -->

  <!-- Card 1: AI Chatbots -->
  <rect x="12"  y="12" width="278" height="160" rx="10" fill="url(#wcard)"/>
  <rect class="ws" x="12" y="12" width="30" height="160" fill="#c084fc" clip-path="url(#c1)"/>
  <rect class="wb1" x="12" y="12" width="278" height="160" rx="10" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <text class="wi" x="38" y="58" font-family="Arial" font-size="26">🤖</text>
  <text class="wl" x="75" y="48" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" filter="url(#wg)">AI CHATBOTS</text>
  <text class="wl" x="75" y="65" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c084fc" style="animation-delay:-0.5s">Claude API · WhatsApp</text>
  <text x="22" y="93"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">Multi-turn conversations with tool</text>
  <text x="22" y="109" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">use, context memory, webhook</text>
  <text x="22" y="125" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">integration &amp; admin dashboards.</text>
  <rect x="22" y="139" width="256" height="3" rx="1.5" fill="#1a0040"/>
  <rect class="wpb1" x="22" y="139" height="3" rx="1.5" fill="#fbbf24" opacity="0.85"/>
  <text class="wl" x="22" y="158" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#fbbf24" style="animation-delay:-1.8s">Claude · Twilio · Express · JSON</text>

  <!-- Card 2: SaaS Tools -->
  <rect x="311" y="12" width="278" height="160" rx="10" fill="url(#wcard)"/>
  <rect class="ws2" x="311" y="12" width="30" height="160" fill="#fbbf24" clip-path="url(#c2)"/>
  <rect class="wb2" x="311" y="12" width="278" height="160" rx="10" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text class="wi" x="337" y="58" font-family="Arial" font-size="26">🏢</text>
  <text class="wl" x="374" y="48" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" filter="url(#wg)">SaaS TOOLS</text>
  <text class="wl" x="374" y="65" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c084fc" style="animation-delay:-1s">Admin panels · Multi-tenant</text>
  <text x="321" y="93"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">Role-based access, billing-ready</text>
  <text x="321" y="109" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">architecture, configurable themes</text>
  <text x="321" y="125" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">and white-label deployments.</text>
  <rect x="321" y="139" width="256" height="3" rx="1.5" fill="#1a0040"/>
  <rect class="wpb2" x="321" y="139" height="3" rx="1.5" fill="#c084fc" opacity="0.85"/>
  <text class="wl" x="321" y="158" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#fbbf24" style="animation-delay:-0.6s">Node.js · JWT · MongoDB · React</text>

  <!-- Card 3: Automation -->
  <rect x="610" y="12" width="278" height="160" rx="10" fill="url(#wcard)"/>
  <rect class="ws3" x="610" y="12" width="30" height="160" fill="#c084fc" clip-path="url(#c3)"/>
  <rect class="wb3" x="610" y="12" width="278" height="160" rx="10" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <text class="wi" x="636" y="58" font-family="Arial" font-size="26">⚙️</text>
  <text class="wl" x="673" y="48" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" filter="url(#wg)">AUTOMATION</text>
  <text class="wl" x="673" y="65" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c084fc" style="animation-delay:-1.5s">Webhooks · Cron jobs</text>
  <text x="620" y="93"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">Event-driven workflows, scheduled</text>
  <text x="620" y="109" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">tasks, API integrations and</text>
  <text x="620" y="125" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">real-time notification systems.</text>
  <rect x="620" y="139" width="256" height="3" rx="1.5" fill="#1a0040"/>
  <rect class="wpb3" x="620" y="139" height="3" rx="1.5" fill="#fbbf24" opacity="0.85"/>
  <text class="wl" x="620" y="158" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#fbbf24" style="animation-delay:-1.2s">Cron · Webhooks · REST · Events</text>

  <!-- ===== ROW 2 ===== -->

  <!-- Card 4: Full Stack Apps -->
  <rect x="12"  y="208" width="278" height="160" rx="10" fill="url(#wcard)"/>
  <rect class="ws4" x="12" y="208" width="30" height="160" fill="#fbbf24" clip-path="url(#c4)"/>
  <rect class="wb4" x="12" y="208" width="278" height="160" rx="10" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text class="wi" x="38" y="254" font-family="Arial" font-size="26">🌐</text>
  <text class="wl" x="75" y="244" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" filter="url(#wg)">FULL STACK APPS</text>
  <text class="wl" x="75" y="261" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c084fc" style="animation-delay:-2s">REST APIs · SPA · SSR</text>
  <text x="22" y="289"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">End-to-end development from DB</text>
  <text x="22" y="305" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">schema to UI, zero-to-production</text>
  <text x="22" y="321" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">deployment included.</text>
  <rect x="22" y="335" width="256" height="3" rx="1.5" fill="#1a0040"/>
  <rect class="wpb4" x="22" y="335" height="3" rx="1.5" fill="#c084fc" opacity="0.85"/>
  <text class="wl" x="22" y="354" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#fbbf24" style="animation-delay:-2.2s">React · Express · SQLite · Docker</text>

  <!-- Card 5: Auth & Security -->
  <rect x="311" y="208" width="278" height="160" rx="10" fill="url(#wcard)"/>
  <rect class="ws5" x="311" y="208" width="30" height="160" fill="#c084fc" clip-path="url(#c5)"/>
  <rect class="wb5" x="311" y="208" width="278" height="160" rx="10" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <text class="wi" x="337" y="254" font-family="Arial" font-size="26">🔐</text>
  <text class="wl" x="374" y="244" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" filter="url(#wg)">AUTH &amp; SECURITY</text>
  <text class="wl" x="374" y="261" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c084fc" style="animation-delay:-2.5s">JWT · Sessions · HMAC</text>
  <text x="321" y="289"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">Token-based auth, refresh flows,</text>
  <text x="321" y="305" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">role middleware, signed cookies</text>
  <text x="321" y="321" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">and secure API design patterns.</text>
  <rect x="321" y="335" width="256" height="3" rx="1.5" fill="#1a0040"/>
  <rect class="wpb5" x="321" y="335" height="3" rx="1.5" fill="#fbbf24" opacity="0.85"/>
  <text class="wl" x="321" y="354" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#fbbf24" style="animation-delay:-0.9s">JWT · HMAC · bcrypt · Middleware</text>

  <!-- Card 6: PWA & Mobile-First -->
  <rect x="610" y="208" width="278" height="160" rx="10" fill="url(#wcard)"/>
  <rect class="ws6" x="610" y="208" width="30" height="160" fill="#fbbf24" clip-path="url(#c6)"/>
  <rect class="wb6" x="610" y="208" width="278" height="160" rx="10" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text class="wi" x="636" y="254" font-family="Arial" font-size="26">📱</text>
  <text class="wl" x="673" y="244" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#fbbf24" filter="url(#wg)">PWA &amp; MOBILE-FIRST</text>
  <text class="wl" x="673" y="261" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c084fc" style="animation-delay:-1.2s">Offline · Installable · Responsive</text>
  <text x="620" y="289"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">Service workers, offline caching,</text>
  <text x="620" y="305" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">push notifications, installable on</text>
  <text x="620" y="321" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#cccccc">any device with no app store.</text>
  <rect x="620" y="335" width="256" height="3" rx="1.5" fill="#1a0040"/>
  <rect class="wpb6" x="620" y="335" height="3" rx="1.5" fill="#c084fc" opacity="0.85"/>
  <text class="wl" x="620" y="354" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#fbbf24" style="animation-delay:-1.5s">Service Workers · Cache · i18n</text>
</svg>
