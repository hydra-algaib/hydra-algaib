<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a0040"/>
      <stop offset="60%"  stop-color="#0d0025"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </radialGradient>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="40%"  stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outer-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c084fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <filter id="gold-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="purple-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <style>
      @keyframes rot-slow { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
      @keyframes rot-rev  { 0%{transform:rotate(0deg)} 100%{transform:rotate(-360deg)} }
      @keyframes pulse-gold { 0%,100%{opacity:0.9} 50%{opacity:0.5} }
      @keyframes pulse-ring { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:0.2;transform:scale(1.04)} }
      @keyframes pulse-outer{ 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:0.08;transform:scale(1.08)} }
      @keyframes head-pulse { 0%,100%{opacity:0.85;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.92)} }
      @keyframes core-breathe{ 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.7;transform:scale(0.88)} }
      @keyframes eye-blink { 0%,90%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.08)} }

      .ring-outer { animation: pulse-outer 5s ease-in-out infinite; transform-box:fill-box; transform-origin:center }
      .ring-mid   { animation: pulse-ring  4s ease-in-out infinite; transform-box:fill-box; transform-origin:center }
      .rot-cw     { animation: rot-slow 18s linear infinite; transform-box:fill-box; transform-origin:center }
      .rot-ccw    { animation: rot-rev  12s linear infinite; transform-box:fill-box; transform-origin:center }
      .rot-slow2  { animation: rot-slow 30s linear infinite; transform-box:fill-box; transform-origin:center }
      .head       { animation: head-pulse 3s ease-in-out infinite; transform-box:fill-box; transform-origin:center }
      .head2      { animation: head-pulse 3.5s ease-in-out infinite 0.5s; transform-box:fill-box; transform-origin:center }
      .head3      { animation: head-pulse 4s ease-in-out infinite 1s; transform-box:fill-box; transform-origin:center }
      .head4      { animation: head-pulse 3.2s ease-in-out infinite 1.5s; transform-box:fill-box; transform-origin:center }
      .head5      { animation: head-pulse 3.8s ease-in-out infinite 0.8s; transform-box:fill-box; transform-origin:center }
      .core       { animation: core-breathe 2.8s ease-in-out infinite; transform-box:fill-box; transform-origin:center }
      .eye        { animation: eye-blink 6s ease-in-out infinite; transform-box:fill-box; transform-origin:center }
      .gold-pulse { animation: pulse-gold 3s ease-in-out infinite }
    </style>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Outer ambient glow -->
  <circle cx="250" cy="250" r="220" fill="url(#outer-glow)" filter="url(#soft)"/>

  <!-- Outermost decorative ring -->
  <circle class="ring-outer" cx="250" cy="250" r="210" fill="none" stroke="#c084fc" stroke-width="0.8" stroke-dasharray="4 12" opacity="0.4"/>

  <!-- Rotating outer hex frame -->
  <g class="rot-slow2">
    <polygon points="250,42 416,148 416,352 250,458 84,352 84,148" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.25"/>
  </g>

  <!-- Rotating dashed ring -->
  <g class="rot-cw">
    <circle cx="250" cy="250" r="185" fill="none" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="3 18" opacity="0.35"/>
  </g>

  <!-- Counter-rotating inner ring -->
  <g class="rot-ccw">
    <circle cx="250" cy="250" r="155" fill="none" stroke="#c084fc" stroke-width="1" stroke-dasharray="6 10" opacity="0.4"/>
    <!-- Small marks on ring -->
    <circle cx="250" cy="95"  r="3" fill="#c084fc" opacity="0.6"/>
    <circle cx="250" cy="405" r="3" fill="#c084fc" opacity="0.6"/>
    <circle cx="95"  cy="250" r="3" fill="#c084fc" opacity="0.6"/>
    <circle cx="405" cy="250" r="3" fill="#c084fc" opacity="0.6"/>
  </g>

  <!-- Middle ring -->
  <circle class="ring-mid" cx="250" cy="250" r="130" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>

  <!-- 5 Hydra heads — triangular points radiating out -->
  <!-- Head 1 — top -->
  <g class="head">
    <polygon points="250,95 235,145 265,145" fill="#fbbf24" opacity="0.85" filter="url(#gold-glow)"/>
    <polygon points="250,80 240,105 260,105" fill="#fbbf24" opacity="0.5"/>
  </g>
  <!-- Head 2 — top-right -->
  <g class="head2">
    <polygon points="390,145 355,175 370,205" fill="#fbbf24" opacity="0.85" filter="url(#gold-glow)"/>
    <polygon points="408,132 368,160 382,175" fill="#fbbf24" opacity="0.5"/>
  </g>
  <!-- Head 3 — bottom-right -->
  <g class="head3">
    <polygon points="355,340 330,305 360,295" fill="#fbbf24" opacity="0.85" filter="url(#gold-glow)"/>
    <polygon points="375,358 345,318 375,308" fill="#fbbf24" opacity="0.5"/>
  </g>
  <!-- Head 4 — bottom-left -->
  <g class="head4">
    <polygon points="145,340 140,305 170,295" fill="#fbbf24" opacity="0.85" filter="url(#gold-glow)"/>
    <polygon points="125,358 125,318 155,308" fill="#fbbf24" opacity="0.5"/>
  </g>
  <!-- Head 5 — top-left -->
  <g class="head5">
    <polygon points="110,145 130,175 145,205" fill="#fbbf24" opacity="0.85" filter="url(#gold-glow)"/>
    <polygon points="92,132 118,160 118,178" fill="#fbbf24" opacity="0.5"/>
  </g>

  <!-- Body connector lines from center to heads -->
  <line x1="250" y1="250" x2="250" y2="142" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
  <line x1="250" y1="250" x2="372" y2="178" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
  <line x1="250" y1="250" x2="348" y2="308" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
  <line x1="250" y1="250" x2="152" y2="308" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
  <line x1="250" y1="250" x2="128" y2="178" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>

  <!-- Inner pentagon -->
  <polygon points="250,148 348,215 312,328 188,328 152,215" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.3" filter="url(#purple-glow)"/>

  <!-- Core glow -->
  <circle cx="250" cy="250" r="55" fill="url(#core-glow)" filter="url(#soft)"/>

  <!-- Core circle -->
  <g class="core">
    <circle cx="250" cy="250" r="38" fill="#0a0010" stroke="#fbbf24" stroke-width="2" opacity="0.95"/>
    <!-- Eye inside core -->
    <g class="eye">
      <ellipse cx="250" cy="250" rx="18" ry="12" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.9"/>
      <circle cx="250" cy="250" r="5" fill="#fbbf24" opacity="0.95" filter="url(#gold-glow)"/>
      <circle cx="250" cy="250" r="2" fill="#0a0010"/>
    </g>
  </g>

  <!-- Corner dots decoration -->
  <circle cx="58"  cy="58"  r="2" fill="#c084fc" opacity="0.3"/>
  <circle cx="442" cy="58"  r="2" fill="#c084fc" opacity="0.3"/>
  <circle cx="58"  cy="442" r="2" fill="#c084fc" opacity="0.3"/>
  <circle cx="442" cy="442" r="2" fill="#c084fc" opacity="0.3"/>
</svg>
