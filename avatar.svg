<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="abg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a0040"/>
      <stop offset="60%"  stop-color="#0d0025"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </radialGradient>
    <radialGradient id="acore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0.95"/>
      <stop offset="40%"  stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <filter id="agold" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="apurp" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="asoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <style>
      @keyframes arot1{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
      @keyframes arot2{0%{transform:rotate(0deg)}100%{transform:rotate(-360deg)}}
      @keyframes apulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
      @keyframes aeye{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
      @keyframes aorb{0%{transform:rotate(0deg) translateX(105px) rotate(0deg)}100%{transform:rotate(360deg) translateX(105px) rotate(-360deg)}}
      @keyframes aorb2{0%{transform:rotate(120deg) translateX(105px) rotate(-120deg)}100%{transform:rotate(480deg) translateX(105px) rotate(-480deg)}}
      @keyframes aorb3{0%{transform:rotate(240deg) translateX(105px) rotate(-240deg)}100%{transform:rotate(600deg) translateX(105px) rotate(-600deg)}}
      /* Subtle head amplitudes: 2px, 4px, 3px, 4px, 3px */
      @keyframes ahead1{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-2px) scale(1.02)}}
      @keyframes ahead2{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.03)}}
      @keyframes ahead3{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-3px) scale(1.02)}}
      @keyframes ahead4{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.03)}}
      @keyframes ahead5{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-3px) scale(1.02)}}
      @keyframes aglow{0%,100%{opacity:0.06}50%{opacity:0.18}}
      @keyframes aorbs{0%,100%{r:5;opacity:0.9}50%{r:6.5;opacity:1}}
      @keyframes aorbs2{0%,100%{r:3;opacity:0.8}50%{r:4;opacity:1}}
      @keyframes aorbs3{0%,100%{r:4;opacity:0.7}50%{r:5;opacity:0.9}}
      .ar1{animation:arot1 20s linear infinite;transform-box:fill-box;transform-origin:200px 200px}
      .ar2{animation:arot2 15s linear infinite;transform-box:fill-box;transform-origin:200px 200px}
      .ar3{animation:arot1 30s linear infinite;transform-box:fill-box;transform-origin:200px 200px}
      .apulse{animation:apulse 3s ease-in-out infinite;transform-box:fill-box;transform-origin:200px 200px}
      .aeye{animation:aeye 2.5s ease-in-out infinite;transform-box:fill-box;transform-origin:200px 200px}
      .aorb1{animation:aorb  8s linear infinite;transform-box:fill-box;transform-origin:200px 200px}
      .aorb2{animation:aorb2 8s linear infinite;transform-box:fill-box;transform-origin:200px 200px}
      .aorb3{animation:aorb3 8s linear infinite;transform-box:fill-box;transform-origin:200px 200px}
      /* Pulsing orbital dot sizes (independent of orbit rotation — separate group trick not viable; keep size via filter) */
      .ah1{animation:ahead1 2.8s ease-in-out infinite;transform-box:fill-box;transform-origin:200px 76px}
      .ah2{animation:ahead2 3.4s ease-in-out infinite;animation-delay:-0.6s;transform-box:fill-box;transform-origin:312px 116px}
      .ah3{animation:ahead3 3.1s ease-in-out infinite;animation-delay:-1.2s;transform-box:fill-box;transform-origin:284px 272px}
      .ah4{animation:ahead4 3.7s ease-in-out infinite;animation-delay:-1.8s;transform-box:fill-box;transform-origin:116px 272px}
      .ah5{animation:ahead5 3.3s ease-in-out infinite;animation-delay:-2.4s;transform-box:fill-box;transform-origin:88px 116px}
      .aglow{animation:aglow 5s ease-in-out infinite}
    </style>
  </defs>

  <rect width="400" height="400" fill="url(#abg)"/>

  <!-- Pulsing outer glow -->
  <circle class="aglow" cx="200" cy="200" r="190" fill="#c084fc" filter="url(#asoft)"/>

  <!-- Rotating rings -->
  <g class="ar1">
    <circle cx="200" cy="200" r="175" fill="none" stroke="#c084fc" stroke-width="0.8" stroke-dasharray="4 10" opacity="0.4"/>
  </g>
  <g class="ar2">
    <polygon points="200,34 332,118 332,282 200,366 68,282 68,118"
             fill="none" stroke="#c084fc" stroke-width="0.8" opacity="0.2"/>
  </g>
  <g class="ar3">
    <circle cx="200" cy="200" r="148" fill="none" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="3 14" opacity="0.3"/>
  </g>

  <circle cx="200" cy="200" r="124" fill="none" stroke="#c084fc" stroke-width="1" stroke-dasharray="6 8" opacity="0.4"/>

  <!-- Orbiting dots — varied sizes: 5, 3, 4 -->
  <circle class="aorb1" cx="200" cy="200" r="5"   fill="#fbbf24" opacity="0.9" filter="url(#agold)"/>
  <circle class="aorb2" cx="200" cy="200" r="3"   fill="#c084fc" opacity="0.85" filter="url(#apurp)"/>
  <circle class="aorb3" cx="200" cy="200" r="4"   fill="#fbbf24" opacity="0.7"/>

  <!-- 5 Hydra heads — each with unique amplitude via separate keyframe -->
  <g class="ah1">
    <polygon points="200,75 186,116 214,116" fill="#fbbf24" opacity="0.9" filter="url(#agold)"/>
    <polygon points="200,62 191,84 209,84" fill="#fbbf24" opacity="0.45"/>
  </g>
  <g class="ah2">
    <polygon points="312,116 284,140 296,164" fill="#fbbf24" opacity="0.9" filter="url(#agold)"/>
    <polygon points="326,105 294,128 306,142" fill="#fbbf24" opacity="0.45"/>
  </g>
  <g class="ah3">
    <polygon points="284,272 264,244 288,236" fill="#fbbf24" opacity="0.9" filter="url(#agold)"/>
    <polygon points="300,286 276,254 300,246" fill="#fbbf24" opacity="0.45"/>
  </g>
  <g class="ah4">
    <polygon points="116,272 112,244 136,236" fill="#fbbf24" opacity="0.9" filter="url(#agold)"/>
    <polygon points="100,286 100,254 124,246" fill="#fbbf24" opacity="0.45"/>
  </g>
  <g class="ah5">
    <polygon points="88,116 104,140 118,164" fill="#fbbf24" opacity="0.9" filter="url(#agold)"/>
    <polygon points="74,105 94,128 94,142" fill="#fbbf24" opacity="0.45"/>
  </g>

  <!-- Body lines -->
  <line x1="200" y1="200" x2="200" y2="114" stroke="#fbbf24" stroke-width="1" opacity="0.15"/>
  <line x1="200" y1="200" x2="298" y2="142" stroke="#fbbf24" stroke-width="1" opacity="0.15"/>
  <line x1="200" y1="200" x2="278" y2="246" stroke="#fbbf24" stroke-width="1" opacity="0.15"/>
  <line x1="200" y1="200" x2="122" y2="246" stroke="#fbbf24" stroke-width="1" opacity="0.15"/>
  <line x1="200" y1="200" x2="102" y2="142" stroke="#fbbf24" stroke-width="1" opacity="0.15"/>

  <!-- Inner pentagon -->
  <polygon points="200,118 278,172 250,262 150,262 122,172"
           fill="none" stroke="#c084fc" stroke-width="0.8" opacity="0.25" filter="url(#apurp)"/>

  <!-- Core glow -->
  <circle cx="200" cy="200" r="44" fill="url(#acore)" filter="url(#asoft)"/>

  <!-- Eye -->
  <g class="apulse">
    <circle cx="200" cy="200" r="30" fill="#0a0010" stroke="#fbbf24" stroke-width="1.8" opacity="0.95"/>
    <ellipse cx="200" cy="200" rx="14" ry="10" fill="none" stroke="#fbbf24" stroke-width="1.2" opacity="0.9"/>
  </g>
  <g class="aeye">
    <circle cx="200" cy="200" r="4" fill="#fbbf24" opacity="0.95" filter="url(#agold)"/>
  </g>
  <circle cx="200" cy="200" r="1.5" fill="#0a0010"/>

  <!-- Corner accents -->
  <circle cx="46"  cy="46"  r="2.5" fill="#c084fc" opacity="0.25"/>
  <circle cx="354" cy="46"  r="2.5" fill="#c084fc" opacity="0.25"/>
  <circle cx="46"  cy="354" r="2.5" fill="#c084fc" opacity="0.25"/>
  <circle cx="354" cy="354" r="2.5" fill="#c084fc" opacity="0.25"/>
</svg>
