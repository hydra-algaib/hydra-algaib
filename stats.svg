<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0010"/>
      <stop offset="100%" stop-color="#1a0040"/>
    </linearGradient>
    <linearGradient id="stcard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#140030"/>
      <stop offset="100%" stop-color="#0a001a"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d0070"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d0070"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0040"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0040"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="stg" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="stbar" x="-10%" y="-80%" width="120%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sthm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <style>
      @keyframes stb{0%,100%{opacity:0.4;stroke:#c084fc}50%{opacity:0.9;stroke:#fbbf24}}
      @keyframes stb2{0%,100%{opacity:0.9;stroke:#fbbf24}50%{opacity:0.4;stroke:#c084fc}}
      @keyframes stpulse{0%,100%{opacity:0.7}50%{opacity:1}}
      @keyframes grow1{0%{width:0}100%{width:180px}}
      @keyframes grow2{0%{width:0}100%{width:120px}}
      @keyframes grow3{0%{width:0}100%{width:200px}}
      @keyframes grow4{0%{width:0}100%{width:90px}}
      @keyframes stspike{0%,100%{opacity:0.6}50%{opacity:1}}
      @keyframes stping{0%{r:5;opacity:0.8}100%{r:14;opacity:0}}
      .stb1{animation:stb  3s ease-in-out infinite}
      .stb2{animation:stb2 3s ease-in-out infinite}
      .stl{animation:stpulse 2.5s ease-in-out infinite}
      .bar1{animation:grow1 1.5s ease-out forwards}
      .bar2{animation:grow2 1.5s ease-out 0.2s forwards;width:0}
      .bar3{animation:grow3 1.5s ease-out 0.4s forwards;width:0}
      .bar4{animation:grow4 1.5s ease-out 0.6s forwards;width:0}
      .stspike{animation:stspike 1.8s ease-in-out infinite}
      .stping{animation:stping 2s ease-out infinite}
    </style>
  </defs>

  <rect width="900" height="200" fill="url(#stbg)"/>

  <!-- Card 1: Overview -->
