<svg width="900" height="24" viewBox="0 0 900 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0010" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#2d0070" stop-opacity="1"/>
      <stop offset="45%"  stop-color="#c084fc" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#c084fc" stop-opacity="1"/>
      <stop offset="85%"  stop-color="#2d0070" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0010" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0010" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#1a0040" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#fbbf24" stop-opacity="0.8"/>
      <stop offset="80%"  stop-color="#1a0040" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0010" stop-opacity="0"/>
    </linearGradient>
    <filter id="diaG" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dsmall" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes dl1{0%,100%{opacity:0.45}50%{opacity:1}}
      @keyframes dl2{0%,100%{opacity:0.9}50%{opacity:0.35}}
      @keyframes ddia{0%,100%{transform:rotate(45deg) scale(1);opacity:0.8}50%{transform:rotate(45deg) scale(1.3);opacity:1}}
      @keyframes ddia2{0%,100%{transform:rotate(45deg) scale(1);opacity:0.4}50%{transform:rotate(45deg) scale(1.15);opacity:0.7}}
      @keyframes dscan{0%{transform:translateX(-900px)}100%{transform:translateX(900px)}}
      @keyframes ddot{0%,100%{opacity:0.3}50%{opacity:0.7}}
      .dl1{animation:dl1 3s ease-in-out infinite}
      .dl2{animation:dl2 3s ease-in-out infinite}
      .ddia{animation:ddia 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .ddia2{animation:ddia2 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .ddia3{animation:ddia2 3s ease-in-out infinite;animation-delay:-1.5s;transform-box:fill-box;transform-origin:center}
      .dscan{animation:dscan 4s linear infinite;opacity:0.08}
      .ddot{animation:ddot 2.5s ease-in-out infinite}
      .ddot2{animation:ddot 2.5s ease-in-out infinite;animation-delay:-1.2s}
    </style>
  </defs>

  <rect width="900" height="24" fill="#0a0010"/>

  <!-- Scan shimmer -->
  <rect class="dscan" x="0" y="0" width="80" height="24" fill="#c084fc"/>

  <!-- Top violet line -->
  <rect class="dl1" y="7"  width="900" height="1.5" fill="url(#dg)"/>
  <!-- Bottom gold line -->
  <rect class="dl2" y="15" width="900" height="1"   fill="url(#dg2)"/>

  <!-- Secondary diamond left (x=380) -->
  <rect class="ddia2" x="375" y="9" width="8" height="8" rx="0.5"
        fill="#c084fc" opacity="0.6" filter="url(#dsmall)"/>

  <!-- Center diamond (x=450) — main -->
  <rect class="ddia" x="444" y="8" width="12" height="12" rx="1"
        fill="#fbbf24" filter="url(#diaG)"/>

  <!-- Secondary diamond right (x=520) -->
  <rect class="ddia3" x="516" y="9" width="8" height="8" rx="0.5"
        fill="#c084fc" opacity="0.6" filter="url(#dsmall)"/>

  <!-- Flanking dots (original) -->
  <circle class="ddot"  cx="420" cy="12" r="2"   fill="#c084fc" opacity="0.5"/>
  <circle class="ddot"  cx="480" cy="12" r="2"   fill="#c084fc" opacity="0.5"/>
  <circle class="ddot2" cx="400" cy="12" r="1.2" fill="#fbbf24" opacity="0.3"/>
  <circle class="ddot2" cx="500" cy="12" r="1.2" fill="#fbbf24" opacity="0.3"/>

  <!-- Extra outer dots flanking secondary diamonds -->
  <circle class="ddot"  cx="360" cy="12" r="1.2" fill="#c084fc" opacity="0.25"/>
  <circle class="ddot2" cx="540" cy="12" r="1.2" fill="#c084fc" opacity="0.25"/>
</svg>
